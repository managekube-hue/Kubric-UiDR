# =============================================================================
# Kubric UIDR — Production Docker Compose
# =============================================================================
# Derived from docker-compose.yml with production hardening:
#   - All app services included (no profile gate)
#   - deploy.replicas for stateless API services
#   - Resource limits (CPU + memory)
#   - Health checks on every service
#   - Restart policy: unless-stopped
#   - JSON-file logging with rotation
#   - Watchtower for automated image updates
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml logs -f ksvc vdr kic noc
#
# Pre-requisites:
#   - Docker Engine 24+ with Compose V2
#   - .env file with production secrets
#   - Minimum 16 GB RAM, 4 CPU cores, 100 GB disk
# =============================================================================

version: "3.9"

x-kubric-env: &kubric-env
  KUBRIC_DATABASE_URL: "postgresql://kubric:${KUBRIC_DB_PASSWORD:-kubric}@postgres:5432/kubric"
  KUBRIC_NATS_URL: "nats://nats:4222"
  KUBRIC_CLICKHOUSE_URL: "clickhouse://default:@clickhouse:9000/kubric"
  KUBRIC_VAULT_ADDR: "http://vault:8200"
  VAULT_ADDR: "http://vault:8200"
  VAULT_TOKEN: "${VAULT_TOKEN:-root}"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

x-deploy-api: &deploy-api
  replicas: 3
  resources:
    limits:
      cpus: "1.0"
      memory: 512M
    reservations:
      cpus: "0.25"
      memory: 128M
  restart_policy:
    condition: unless-stopped
    delay: 5s
    max_attempts: 5
    window: 60s

x-deploy-worker: &deploy-worker
  replicas: 2
  resources:
    limits:
      cpus: "0.5"
      memory: 256M
    reservations:
      cpus: "0.1"
      memory: 64M
  restart_policy:
    condition: unless-stopped
    delay: 5s
    max_attempts: 5
    window: 60s

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "kubric-prod"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kubric
      POSTGRES_PASSWORD: ${KUBRIC_DB_PASSWORD:-kubric}
      POSTGRES_DB: kubric
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubric -d kubric"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/clickhouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.d/kubric.xml:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/kubric.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-kubric-neo4j}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 576M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-root}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: ["vault", "server", "-dev"]
    ports:
      - "8200:8200"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  temporal-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_DB: temporal
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  temporal:
    image: temporalio/auto-setup:1.24
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--namespace", "default", "--address", "localhost:7233"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  temporal-ui:
    image: temporalio/ui:2.28.0
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3001"
    ports:
      - "8233:8080"
    depends_on: [temporal]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait"]
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4096M
        reservations:
          cpus: "1.0"
          memory: 2048M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  n8n:
    image: n8nio/n8n:1.45.1
    restart: unless-stopped
    environment:
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      N8N_HOST: "localhost"
      WEBHOOK_URL: "http://n8n:5678/"
      N8N_BASIC_AUTH_ACTIVE: "false"
      GENERIC_TIMEZONE: "UTC"
      N8N_RUNNERS_ENABLED: "true"
      DEFAULT_TENANT: "${KUBRIC_DEFAULT_TENANT:-acme-corp}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      N8N_WORKFLOW_DIRECTORY: /home/node/.n8n/workflows
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./config/n8n/workflows:/home/node/.n8n/workflows:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kubric
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kubric-minio-secret}
    ports:
      - "9050:9000"
      - "9051:9001"
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-kubric-grafana}
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor tempoSearch"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES (no profile gate — always on in prod)
  # ═══════════════════════════════════════════════════════════════════════════

  ksvc:
    build:
      context: .
      dockerfile: build/ksvc/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy: *deploy-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  vdr:
    build:
      context: .
      dockerfile: build/vdr/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      LISTEN_ADDR: ":8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy: *deploy-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  kic:
    build:
      context: .
      dockerfile: build/kic/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      LISTEN_ADDR: ":8082"
      KAI_RAG_URL: "http://kai-rag:8090"
      GITHUB_AUTH_TOKEN: "${GITHUB_AUTH_TOKEN:-}"
      DUCKDB_PATH: "${DUCKDB_PATH:-:memory:}"
      COSIGN_PUB_KEY: "${COSIGN_PUB_KEY:-}"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy: *deploy-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  noc:
    build:
      context: .
      dockerfile: build/noc/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      LISTEN_ADDR: ":8083"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-kubric-neo4j}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "kubric"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-kubric-minio-secret}"
      ZMQ_PUBLISH_ADDR: "${ZMQ_PUBLISH_ADDR:-}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER:-}"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy: *deploy-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  kai:
    build:
      context: .
      dockerfile: build/kai/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      KAI_LISTEN_ADDR: ":8100"
      KAI_SERVICE_URL: "http://kai-python:8101"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8100:8100"
    depends_on:
      kai-python:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy:
      <<: *deploy-worker
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  kai-python:
    build:
      context: kai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KUBRIC_TENANT_ID: "${KUBRIC_DEFAULT_TENANT:-acme-corp}"
      KUBRIC_NATS_URL: "nats://nats:4222"
      KUBRIC_DATABASE_URL: "postgresql://kubric:${KUBRIC_DB_PASSWORD:-kubric}@postgres:5432/kubric"
      KUBRIC_CLICKHOUSE_URL: "clickhouse://default:@clickhouse:9000/kubric"
      KUBRIC_OLLAMA_URL: "http://ollama:11434"
      KUBRIC_N8N_BASE_URL: "http://n8n:5678"
      KUBRIC_KSVC_URL: "http://ksvc:8080"
      KUBRIC_VDR_URL: "http://vdr:8081"
      KUBRIC_KIC_URL: "http://kic:8082"
      KUBRIC_NOC_URL: "http://noc:8083"
      KUBRIC_TEMPORAL_ADDRESS: "temporal:7233"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8101:8101"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      ollama:
        condition: service_healthy
      temporal:
        condition: service_healthy
    deploy:
      <<: *deploy-worker
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8101/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  temporal-worker:
    build:
      context: .
      dockerfile: build/temporal-worker/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
      TEMPORAL_ADDRESS: "temporal:7233"
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    deploy: *deploy-worker
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  nats-clickhouse-bridge:
    build:
      context: .
      dockerfile: build/nats-clickhouse-bridge/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      <<: *kubric-env
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy: *deploy-worker
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "3001:3001"
    deploy:
      <<: *deploy-worker
      replicas: 2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [ksvc, vdr, kic, noc, kai]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

  # ═══════════════════════════════════════════════════════════════════════════
  # WATCHTOWER — Automated image updates
  # ═══════════════════════════════════════════════════════════════════════════

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCOPE: "kubric-prod"
      WATCHTOWER_SCHEDULE: "0 0 3 * * *"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_NOTIFICATION_URL: "${SLACK_WEBHOOK_URL:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.scope=kubric-prod"
    networks: [kubric]

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  nats-data:
  postgres-data:
  clickhouse-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  temporal-pg-data:
  qdrant-data:
  ollama-data:
  n8n-data:
  minio-data:
  prometheus-data:
  loki-data:
  grafana-data:
  caddy-data:
  caddy-config:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  kubric:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
