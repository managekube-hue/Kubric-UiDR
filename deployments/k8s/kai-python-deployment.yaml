---
# =============================================================================
# Kubric KAI Python — FastAPI / CrewAI personas service
# Deployment + ClusterIP Service for the KAI Python service (port 8101).
#
# This service runs all KAI agent personas (triage, analyst, hunter, keeper,
# sentinel, foresight, house, bill, comm, deploy, simulate, risk, invest)
# via FastAPI + CrewAI.  It is called by the KAI Go gateway (kai:8100) for
# LLM-heavy operations and subscribes to NATS for background processing.
#
# NOTE: Resources are sized for LLM inference (CrewAI + Ollama client).
#   requests: 500m CPU / 1Gi RAM
#   limits:   2000m CPU / 4Gi RAM
#
# NOTE: Probes use /healthz and /readyz as defined in kai/api/main.py.
#   /healthz — always returns 200 once uvicorn is up
#   /readyz  — checks NATS connectivity and Ollama availability
#   initialDelaySeconds=30 accounts for CrewAI + model init time.
#
# Secret references: kubric-secrets must exist in the kubric namespace.
#   kubectl create secret generic kubric-secrets \
#     --from-literal=DATABASE_URL="postgres://..." \
#     --from-literal=NATS_URL="nats://nats:4222" \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=STRIPE_SECRET_KEY="sk_live_..."
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kai-python
  namespace: kubric
  labels:
    app: kai-python
    component: ai-personas
    platform: kubric
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kai-python
  template:
    metadata:
      labels:
        app: kai-python
        component: ai-personas
        platform: kubric
      annotations:
        # Restart on kubric-secrets rotation (checksum injected by Helm/Kustomize).
        checksum/secret: "placeholder-replaced-by-helm"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: kai-python
          image: ghcr.io/managekube-hue/kubric-kai-python:latest
          imagePullPolicy: Always
          command: ["python", "-m", "kai"]
          ports:
            - name: http
              containerPort: 8101
              protocol: TCP
          env:
            # ── Secrets (from kubric-secrets) ─────────────────────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: DATABASE_URL
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: NATS_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: OPENAI_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: STRIPE_SECRET_KEY
            # ── Literals ──────────────────────────────────────────────────────
            - name: KAI_PORT
              value: "8101"
            - name: KAI_HOST
              value: "0.0.0.0"
            - name: KAI_WORKERS
              # Keep at 1: lifespan background tasks (NATS subscriber,
              # Foresight loop) must not be duplicated across forked processes.
              value: "2"
          livenessProbe:
            # /healthz is always 200 once the uvicorn event loop is accepting
            # connections — safe to use as a liveness signal.
            httpGet:
              path: /healthz
              port: 8101
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            # /readyz checks NATS and Ollama; pod is removed from load balancer
            # until both dependencies are healthy.
            httpGet:
              path: /readyz
              port: 8101
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: kai-python
  namespace: kubric
  labels:
    app: kai-python
    component: ai-personas
    platform: kubric
spec:
  type: ClusterIP
  selector:
    app: kai-python
  ports:
    - name: http
      port: 8101
      targetPort: 8101
      protocol: TCP
