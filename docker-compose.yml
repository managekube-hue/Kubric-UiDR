# Kubric-UiDR - Docker Compose (dev + single-node prod)
# Usage: docker compose up -d
# Prerequisites: copy .env.example to .env and fill secrets

name: kubric

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

# ??? Networks ????????????????????????????????????????????????????????????????
networks:
  kubric:
    driver: bridge

# ??? Volumes ?????????????????????????????????????????????????????????????????
volumes:
  postgres_data:
  clickhouse_data:
  nats_data:
  redis_data:
  vault_data:
  minio_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
  loki_data:
  temporal_data:

# ??? Services ????????????????????????????????????????????????????????????????
services:

  # ?? Infrastructure ??????????????????????????????????????????????????????????

  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-kubric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB:       ${POSTGRES_DB:-kubric}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kubric}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["5432:5432"]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    <<: [*restart, *logging]
    environment:
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-kubric}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD required}
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB:-kubric}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["8123:8123", "9000:9000"]

  nats:
    image: nats:2.10-alpine
    <<: [*restart, *logging]
    command: >
      -js
      -sd /data
      -m 8222
      --websocket_port 9222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["4222:4222", "8222:8222", "9222:9222"]

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["6379:6379"]

  vault:
    image: hashicorp/vault:1.17
    <<: [*restart, *logging]
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-kubric-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes: [vault_data:/vault/data]
    healthcheck:
      test: ["CMD-SHELL", "vault status || true"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["8200:8200"]

  minio:
    image: minio/minio:latest
    <<: [*restart, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-kubric}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kubric]
    ports: ["9000:9000", "9001:9001"]

  neo4j:
    image: neo4j:5-community
    <<: [*restart, *logging]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/kubric-dev-password}
    volumes: [neo4j_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [kubric]
    ports: ["7474:7474", "7687:7687"]

  temporal:
    image: temporalio/auto-setup:1.24
    <<: [*restart, *logging]
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER:     ${POSTGRES_USER:-kubric}
      POSTGRES_PWD:      ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_SEEDS:    postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig.yaml
    depends_on:
      postgres: {condition: service_healthy}
    networks: [kubric]
    ports: ["7233:7233"]

  # ?? Observability ??????????????????????????????????????????????????????????

  prometheus:
    image: prom/prometheus:v2.53.0
    <<: [*restart, *logging]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["9090:9090"]

  loki:
    image: grafana/loki:3.1.0
    <<: [*restart, *logging]
    volumes: [loki_data:/loki]
    networks: [kubric]
    ports: ["3100:3100"]

  grafana:
    image: grafana/grafana:11.1.0
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-kubric-dev}
      GF_SERVER_ROOT_URL:         ${GF_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/alerts:/etc/grafana/provisioning/alerting:ro
    depends_on: [prometheus, loki]
    networks: [kubric]
    ports: ["3000:3000"]

  # ?? Go API Services ????????????????????????????????????????????????????????

  ksvc:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: ksvc
    <<: [*restart, *logging]
    image: kubric/ksvc:latest
    environment:
      KUBRIC_DATABASE_URL: ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:     ${KUBRIC_NATS_URL:-nats://nats:4222}
      VAULT_ADDR:          ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN:         ${VAULT_TOKEN:-kubric-dev-root-token}
      KUBRIC_STRIPE_API_KEY: ${KUBRIC_STRIPE_API_KEY:-}
      LISTEN_ADDR:         0.0.0.0:8080
    depends_on:
      postgres:  {condition: service_healthy}
      nats:      {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["8080:8080"]

  vdr:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: vdr
    <<: [*restart, *logging]
    image: kubric/vdr:latest
    environment:
      KUBRIC_DATABASE_URL: ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:     ${KUBRIC_NATS_URL:-nats://nats:4222}
      KUBRIC_CLICKHOUSE_URL: ${KUBRIC_CLICKHOUSE_URL:-clickhouse://kubric:${CLICKHOUSE_PASSWORD}@clickhouse:9000/kubric}
      LISTEN_ADDR:         0.0.0.0:8081
    depends_on:
      postgres:    {condition: service_healthy}
      clickhouse:  {condition: service_healthy}
      nats:        {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["8081:8081"]

  kic:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: kic
    <<: [*restart, *logging]
    image: kubric/kic:latest
    environment:
      KUBRIC_DATABASE_URL: ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:     ${KUBRIC_NATS_URL:-nats://nats:4222}
      KAI_RAG_URL:         ${KUBRIC_KAI_URL:-http://kai:8101}
      LISTEN_ADDR:         0.0.0.0:8082
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["8082:8082"]

  noc:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: noc
    <<: [*restart, *logging]
    image: kubric/noc:latest
    environment:
      KUBRIC_DATABASE_URL:   ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:       ${KUBRIC_NATS_URL:-nats://nats:4222}
      KUBRIC_CLICKHOUSE_URL: ${KUBRIC_CLICKHOUSE_URL:-clickhouse://kubric:${CLICKHOUSE_PASSWORD}@clickhouse:9000/kubric}
      LISTEN_ADDR:           0.0.0.0:8083
    depends_on:
      postgres:   {condition: service_healthy}
      clickhouse: {condition: service_healthy}
      nats:       {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["8083:8083"]

  nats-clickhouse-bridge:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: nats-clickhouse-bridge
    <<: [*restart, *logging]
    image: kubric/nats-clickhouse-bridge:latest
    environment:
      KUBRIC_NATS_URL:       ${KUBRIC_NATS_URL:-nats://nats:4222}
      KUBRIC_CLICKHOUSE_URL: ${KUBRIC_CLICKHOUSE_URL:-clickhouse://kubric:${CLICKHOUSE_PASSWORD}@clickhouse:9000/kubric}
    depends_on:
      clickhouse: {condition: service_healthy}
      nats:       {condition: service_healthy}
    networks: [kubric]

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: temporal-worker
    <<: [*restart, *logging]
    image: kubric/temporal-worker:latest
    environment:
      KUBRIC_DATABASE_URL:     ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:         ${KUBRIC_NATS_URL:-nats://nats:4222}
      KUBRIC_TEMPORAL_ADDRESS: ${KUBRIC_TEMPORAL_ADDRESS:-temporal:7233}
    depends_on:
      postgres: {condition: service_healthy}
      nats:     {condition: service_healthy}
    networks: [kubric]

  # ?? KAI Python AI Layer ????????????????????????????????????????????????????

  kai:
    build:
      context: .
      dockerfile: kai/Dockerfile
    <<: [*restart, *logging]
    image: kubric/kai:latest
    environment:
      KUBRIC_DATABASE_URL:     ${KUBRIC_DATABASE_URL:-postgresql://kubric:${POSTGRES_PASSWORD}@postgres:5432/kubric}
      KUBRIC_NATS_URL:         ${KUBRIC_NATS_URL:-nats://nats:4222}
      KUBRIC_CLICKHOUSE_URL:   ${KUBRIC_CLICKHOUSE_URL:-clickhouse://kubric:${CLICKHOUSE_PASSWORD}@clickhouse:9000/kubric}
      KUBRIC_TEMPORAL_ADDRESS: ${KUBRIC_TEMPORAL_ADDRESS:-temporal:7233}
      KUBRIC_OLLAMA_URL:       ${KUBRIC_OLLAMA_URL:-http://ollama:11434}
      KUBRIC_MODEL_NAME:       ${KUBRIC_MODEL_NAME:-llama3.2}
      KUBRIC_STRIPE_API_KEY:   ${KUBRIC_STRIPE_API_KEY:-}
      KUBRIC_TENANT_ID:        ${KUBRIC_TENANT_ID:-dev-tenant-01}
      KUBRIC_LOG_LEVEL:        ${KUBRIC_LOG_LEVEL:-INFO}
      KUBRIC_API_HOST:         0.0.0.0
      KUBRIC_API_PORT:         8101
    depends_on:
      postgres:  {condition: service_healthy}
      nats:      {condition: service_healthy}
      clickhouse: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8101/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [kubric]
    ports: ["8101:8101"]

  # ?? Frontend ???????????????????????????????????????????????????????????????

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    <<: [*restart, *logging]
    image: kubric/web:latest
    environment:
      NEXT_PUBLIC_API_BASE:   ${NEXT_PUBLIC_API_BASE:-http://ksvc:8080}
      NEXT_PUBLIC_KAI_URL:    ${NEXT_PUBLIC_KAI_URL:-http://kai:8101}
      NEXT_PUBLIC_NATS_WS_URL: ${NEXT_PUBLIC_NATS_WS_URL:-ws://nats:9222}
      NEXTAUTH_URL:            ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET:         ${NEXTAUTH_SECRET:-kubric-dev-secret-change-me}
    depends_on:
      ksvc: {condition: service_healthy}
      kai:  {condition: service_healthy}
    networks: [kubric]
    ports: ["3001:3001"]
