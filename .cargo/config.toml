# .cargo/config.toml — workspace-level Cargo configuration

# ── Windows: point the pcap crate's build.rs at our generated wpcap.lib ───────
# wpcap.lib is generated from the installed npcap wpcap.dll via
#   scripts/gen_wpcap_lib.ps1
# Run that script once after cloning on a Windows dev machine.
[env]
# pcap crate's build.rs checks LIBPCAP_LIBDIR and emits:
#   cargo:rustc-link-search=native={libdir}
# This makes the linker find both wpcap.lib and Packet.lib.
# wpcap.lib + Packet.lib are generated by scripts/gen_wpcap_lib.ps1
LIBPCAP_LIBDIR = { value = "vendor/pcap-sdk/x64", relative = true }
