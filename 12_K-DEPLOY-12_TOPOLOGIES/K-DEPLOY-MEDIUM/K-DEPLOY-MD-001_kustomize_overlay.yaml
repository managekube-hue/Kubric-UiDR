apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Medium deployment overlay: 3x ksvc, 3x noc, 2x kai replicas with
# increased CPU/memory resource allocations.
# Apply with: kubectl apply -k 12_K-DEPLOY-12_TOPOLOGIES/K-DEPLOY-MEDIUM/

namespace: kubric

bases:
  - ../../deployments/k8s

# Replica and resource overrides via strategic merge patches.
patchesStrategicMerge:
  - patch-ksvc.yaml
  - patch-noc.yaml
  - patch-kai.yaml
  - patch-vdr.yaml
  - patch-kic.yaml

# Common labels applied to all resources in this overlay.
commonLabels:
  kubric.io/deployment-size: medium

# --- Inline patch definitions ---
# These are written as separate patch files referenced above.
# For a single-file overlay, the patches are embedded below using
# the patches directive.

patches:
  # K-SVC: 3 replicas, higher resources
  - target:
      kind: Deployment
      name: ksvc
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ksvc
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: ksvc
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  # NOC: 3 replicas, higher resources (correlation engine is CPU-intensive)
  - target:
      kind: Deployment
      name: noc
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: noc
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: noc
                resources:
                  requests:
                    cpu: 750m
                    memory: 768Mi
                  limits:
                    cpu: "3"
                    memory: 2Gi

  # KAI gateway: 2 replicas
  - target:
      kind: Deployment
      name: kai
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kai
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: kai
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  # VDR: 2 replicas, moderate resources
  - target:
      kind: Deployment
      name: vdr
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vdr
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: vdr
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi

  # KIC: 2 replicas, moderate resources
  - target:
      kind: Deployment
      name: kic
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kic
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: kic
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 512Mi
