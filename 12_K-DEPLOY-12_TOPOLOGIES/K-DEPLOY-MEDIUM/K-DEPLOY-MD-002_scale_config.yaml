# HorizontalPodAutoscaler configurations for Kubric medium deployment.
# Uses autoscaling/v2 API for CPU-based scaling.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ksvc-hpa
  namespace: kubric
  labels:
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: ksvc
    kubric.io/deployment-size: medium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ksvc
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: noc-hpa
  namespace: kubric
  labels:
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: noc
    kubric.io/deployment-size: medium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: noc
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kai-hpa
  namespace: kubric
  labels:
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: kai
    kubric.io/deployment-size: medium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kai
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
