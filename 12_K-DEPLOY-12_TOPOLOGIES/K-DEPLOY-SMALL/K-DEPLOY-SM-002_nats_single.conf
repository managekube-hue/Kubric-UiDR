# ─────────────────────────────────────────────────────────────────────
# NATS Single-Node Configuration – Kubric UiDR Small Deployment
# ─────────────────────────────────────────────────────────────────────
# Designed for environments with < 100 monitored endpoints.
# Runs as a single NATS server inside Docker Compose with JetStream
# enabled for durable event delivery.  No clustering overhead.
#
# Usage:
#   nats-server -c K-DEPLOY-SM-002_nats_single.conf
# ─────────────────────────────────────────────────────────────────────

# ── Server identity ─────────────────────────────────────────────────
server_name: kubric-nats-single

# ── Client listener ─────────────────────────────────────────────────
listen: 0.0.0.0:4222

# ── HTTP monitoring ─────────────────────────────────────────────────
http_port: 8222

# ── Logging ──────────────────────────────────────────────────────────
debug:   false
trace:   false
logtime: true

# ── Connection limits ───────────────────────────────────────────────
max_connections: 1024
max_payload:     8388608     # 8 MB
ping_interval:   "30s"
ping_max:        5
write_deadline:  "10s"

# ── JetStream (conservative limits for single-node) ─────────────────
jetstream {
  store_dir:        "/data/nats/jetstream"
  max_memory_store: 268435456    # 256 MB
  max_file_store:   2147483648   # 2 GB
  domain:           "kubric"
}

# ── NO clustering ────────────────────────────────────────────────────
# Single-node deployment – cluster block intentionally omitted.

# ── Leafnode listener ────────────────────────────────────────────────
# Remote agents can still connect as leafnodes for store-and-forward.
leafnodes {
  listen: 0.0.0.0:7422
}

# ── Accounts & Authorization ────────────────────────────────────────
accounts {

  # System / operator account
  SYS {
    users: [
      { user: sys_admin, password: "$2a$11$SYSADMIN_BCRYPT_HASH_PLACEHOLDER" }
    ]
  }

  # Application account – all Kubric services & agents
  KUBRIC {
    jetstream: enabled

    users: [
      # API gateway
      {
        user: kubric_api
        password: "$2a$11$API_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish:   { allow: ["kubric.>", "$JS.API.>"] }
          subscribe: { allow: ["kubric.>", "_INBOX.>", "$JS.API.>", "$JS.ACK.>"] }
        }
      }

      # XRO agents
      {
        user: kubric_agent
        password: "$2a$11$AGENT_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish: {
            allow: [
              "kubric.events.>"
              "kubric.health.>"
              "kubric.deploy.>"
              "$JS.API.>"
            ]
          }
          subscribe: {
            allow: [
              "kubric.commands.>"
              "kubric.config.>"
              "_INBOX.>"
              "$JS.API.>"
              "$JS.ACK.>"
            ]
          }
        }
      }

      # Ingest pipeline
      {
        user: kubric_ingest
        password: "$2a$11$INGEST_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish:   { allow: ["kubric.events.>", "kubric.metrics.>", "$JS.API.>"] }
          subscribe: { allow: ["_INBOX.>", "$JS.API.>", "$JS.ACK.>"] }
        }
      }
    ]

    # ── JetStream streams (created by init container) ────────────────
    #
    # Stream: EVENTS
    #   subjects: ["kubric.events.>"]
    #   retention: limits
    #   max_msgs_per_subject: 1_000_000
    #   max_bytes: 2_147_483_648   (2 GB)
    #   max_age: 3d
    #   storage: file
    #   replicas: 1                (single node)
    #   discard: old
    #   duplicate_window: 2m
    #
    # Stream: HEALTH
    #   subjects: ["kubric.health.>"]
    #   retention: limits
    #   max_msgs_per_subject: 50_000
    #   max_bytes: 268_435_456     (256 MB)
    #   max_age: 24h
    #   storage: file
    #   replicas: 1
    #
    # Stream: COMMANDS
    #   subjects: ["kubric.commands.>"]
    #   retention: work_queue
    #   max_bytes: 268_435_456
    #   max_age: 1h
    #   storage: file
    #   replicas: 1
    #
    # Stream: METRICS
    #   subjects: ["kubric.metrics.>"]
    #   retention: limits
    #   max_msgs_per_subject: 500_000
    #   max_bytes: 1_073_741_824   (1 GB)
    #   max_age: 1d
    #   storage: file
    #   replicas: 1
    #
    # Stream: DEPLOY
    #   subjects: ["kubric.deploy.>"]
    #   retention: limits
    #   max_msgs_per_subject: 50_000
    #   max_bytes: 268_435_456
    #   max_age: 14d
    #   storage: file
    #   replicas: 1

    exports: [
      { stream: "kubric.events.>",  accounts: [SYS] }
      { stream: "kubric.health.>",  accounts: [SYS] }
    ]
  }
}

system_account: SYS
