apiVersion: v1
kind: Namespace
metadata:
  name: kubric
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: kubric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: kubric
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndr-rita
  namespace: kubric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndr-rita
  template:
    metadata:
      labels:
        app: ndr-rita
    spec:
      containers:
        - name: ndr-rita
          image: kubric/ndr-rita:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NDR_RITA_LISTEN
              value: ":4096"
            - name: CLICKHOUSE_URL
              value: ""
          ports:
            - containerPort: 4096
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4096
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ndr-rita
  namespace: kubric
spec:
  selector:
    app: ndr-rita
  ports:
    - name: http
      port: 4096
      targetPort: 4096
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coresec
  namespace: kubric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coresec
  template:
    metadata:
      labels:
        app: coresec
    spec:
      containers:
        - name: coresec
          image: kubric/coresec:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBRIC_TENANT_ID
              value: dev-tenant-01
            - name: KUBRIC_AGENT_ID
              value: coresec-minikube
            - name: KUBRIC_NATS_URL
              value: nats://nats.kubric.svc.cluster.local:4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netguard
  namespace: kubric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netguard
  template:
    metadata:
      labels:
        app: netguard
    spec:
      containers:
        - name: netguard
          image: kubric/netguard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBRIC_TENANT_ID
              value: dev-tenant-01
            - name: KUBRIC_AGENT_ID
              value: netguard-minikube
            - name: KUBRIC_NATS_URL
              value: nats://nats.kubric.svc.cluster.local:4222
            - name: KUBRIC_RITA_URL
              value: http://ndr-rita.kubric.svc.cluster.local:4096
            - name: KUBRIC_INTERFACE
              value: eth0
