apiVersion: 1

datasources:
  # ── Prometheus ────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  # ── VictoriaMetrics (optional — same port as Prometheus, toggle URL) ──────
  # - name: VictoriaMetrics
  #   type: victoriametrics-datasource
  #   uid: victoriametrics
  #   access: proxy
  #   url: http://victoriametrics:8428

  # ── Loki — log aggregation ────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: tenant_id=([^\s]+)
          name: TenantID
          url: ''

  # ── Tempo — distributed tracing ────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  # ── ClickHouse — event lakehouse ──────────────────────────────────────────
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    isDefault: true
    url: http://clickhouse:8123
    jsonData:
      host: clickhouse
      port: 9000
      username: default
      defaultDatabase: kubric
      protocol: native
      secure: false
