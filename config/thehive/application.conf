# TheHive 5 configuration — docker-compose dev deployment
play.http.secret.key = "kubric-thehive-secret-change-in-production-min-32-chars"

db.janusgraph {
  storage.backend  = berkeleyje
  storage.directory = /opt/thehive/data/db
  berkeleyje.freeDisk = 200
}

storage {
  provider  = localfs
  localfs.location = /opt/thehive/data/files
}

auth {
  providers: [
    { name: session }
    { name: basic, realName: "Basic" }
    { name: local }
  ]
}

cortex {
  servers = [
    {
      name = "Cortex"
      url = "http://cortex:9001"
      auth { type = "NoAuth" }
    }
  ]
}
