# K-DL-MIG-002 — Liquibase K8s Init Container
# Database migration tool for K8s-deployed PostgreSQL
# Runs changelogs as init containers before service startup
#
# Complements golang-migrate for K8s-native deployments

apiVersion: v1
kind: ConfigMap
metadata:
  name: liquibase-changelog
  namespace: kubric
data:
  changelog.yaml: |
    databaseChangeLog:
      - changeSet:
          id: 001-foundation
          author: kubric
          changes:
            - sqlFile:
                path: classpath:db/migrations/001_layer0_foundation.up.sql
          rollback:
            - sqlFile:
                path: classpath:db/migrations/001_layer0_foundation.down.sql

      - changeSet:
          id: 002-tenant-rls
          author: kubric
          changes:
            - sqlFile:
                path: classpath:db/migrations/002_tenant_rls.up.sql
          rollback:
            - sqlFile:
                path: classpath:db/migrations/002_tenant_rls.down.sql

      - changeSet:
          id: 003-oscal-ingestion
          author: kubric
          changes:
            - sqlFile:
                path: classpath:migrations/postgres/003_oscal_ingestion.sql
          rollback:
            - sql: DROP TABLE IF EXISTS tenant_control_status CASCADE;
            - sql: DROP TABLE IF EXISTS oscal_control_enhancements CASCADE;
            - sql: DROP TABLE IF EXISTS oscal_controls CASCADE;

      - changeSet:
          id: 004-contract-rates
          author: kubric
          changes:
            - sqlFile:
                path: classpath:migrations/postgres/002_contract_rate_tables.sql
          rollback:
            - sql: DROP VIEW IF EXISTS billing_usage_summary;
            - sql: DROP TABLE IF EXISTS contract_rate_tables CASCADE;
---
# Job to run Liquibase migrations
apiVersion: batch/v1
kind: Job
metadata:
  name: liquibase-migrate
  namespace: kubric
  labels:
    app.kubernetes.io/name: liquibase
    app.kubernetes.io/part-of: kubric
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: liquibase
          image: liquibase/liquibase:4.25
          command: ["liquibase"]
          args:
            - "--url=$(DB_URL)"
            - "--changelog-file=changelog.yaml"
            - "--username=$(DB_USER)"
            - "--password=$(DB_PASSWORD)"
            - "update"
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgresql.kubric.svc.cluster.local:5432/kubric"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            - name: changelog
              mountPath: /liquibase/changelog.yaml
              subPath: changelog.yaml
            - name: migrations
              mountPath: /liquibase/db/migrations
            - name: pg-migrations
              mountPath: /liquibase/migrations/postgres
      volumes:
        - name: changelog
          configMap:
            name: liquibase-changelog
        - name: migrations
          configMap:
            name: db-migrations
        - name: pg-migrations
          configMap:
            name: pg-migrations
  backoffLimit: 3
