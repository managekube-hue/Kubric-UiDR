# K-MB-001 — NATS Cluster Configuration
# 3-node JetStream cluster with mTLS, authorization, and subject permissions
# Companion to the StatefulSet at infra/k8s/statefulsets/nats-statefulset.yaml

# NATS Helm release for production deployment
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nats
  namespace: kubric
spec:
  interval: 10m
  chart:
    spec:
      chart: nats
      version: "1.1.x"
      sourceRef:
        kind: HelmRepository
        name: nats
        namespace: flux-system
  values:
    cluster:
      enabled: true
      replicas: 3
    nats:
      jetstream:
        enabled: true
        memStorage:
          enabled: true
          size: 2Gi
        fileStorage:
          enabled: true
          size: 50Gi
          storageClassName: fast-ssd
      tls:
        secret:
          name: nats-tls
        ca: ca.crt
        cert: tls.crt
        key: tls.key
    auth:
      enabled: true
      resolver:
        type: full
      # Service accounts mapped to NATS users
      users:
        - user: coresec
          password: "${NATS_CORESEC_PASS}"
          permissions:
            publish:
              allow:
                - "kubric.edr.>"
                - "kubric.health.>"
            subscribe:
              allow:
                - "kubric.ti.>"
                - "kubric.remediation.>"
        - user: netguard
          password: "${NATS_NETGUARD_PASS}"
          permissions:
            publish:
              allow:
                - "kubric.ndr.>"
                - "kubric.health.>"
            subscribe:
              allow:
                - "kubric.ti.>"
        - user: kai
          password: "${NATS_KAI_PASS}"
          permissions:
            publish:
              allow:
                - "kubric.>"
            subscribe:
              allow:
                - "kubric.>"
        - user: ksvc
          password: "${NATS_KSVC_PASS}"
          permissions:
            publish:
              allow:
                - "kubric.svc.>"
                - "kubric.billing.>"
                - "kubric.health.>"
            subscribe:
              allow:
                - "kubric.>"
        - user: vdr
          password: "${NATS_VDR_PASS}"
          permissions:
            publish:
              allow:
                - "kubric.vdr.>"
            subscribe:
              allow:
                - "kubric.ti.>"
                - "kubric.remediation.>"
    # JetStream streams (created on startup)
    additionalConfigs:
      jetstream-streams.conf: |
        jetstream {
          max_memory_store: 4GB
          max_file_store: 200GB
        }
    monitoring:
      enabled: true
      port: 8222
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "7777"
