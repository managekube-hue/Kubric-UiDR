# NOTES FOR CONTRIBUTORS
# ═════════════════════════════════════════════════════════════════════════════
#
# 1. If you suppress a clippy lint with #[allow(...)], ALWAYS add a comment
#    explaining why.  PR reviewers will reject bare allows.
#
# 2. When adding a new crate to the workspace, run:
#      cargo clippy -p <crate> -- -D warnings
#    before opening the PR.
#
# 3. To run clippy with nightly-only lints for a deeper audit:
#      cargo +nightly clippy --workspace -- -W clippy::pedantic
#    This is informational only; CI uses the pinned stable channel.
#
# 4. Clippy configuration keys are version-sensitive.  If a key is not
#    recognised after a toolchain upgrade, check:
#      https://doc.rust-lang.org/clippy/configuration.html
