# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  K-DEV-GIT-013  isort Import Sorting Configuration                         ║
# ║  Module: Kubric-UiDR — KAI AI Orchestration Layer (Python 3.12)            ║
# ║  Format: setup.cfg / .isort.cfg style                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# isort deterministically sorts Python imports into sections (stdlib →
# third-party → first-party → local).  The output is Black-compatible when
# profile = black.
#
# NOTE: Ruff's isort implementation (rule prefix "I") reads the equivalent
# settings from pyproject.toml [tool.ruff.lint.isort].  This cfg file is the
# canonical reference for tools that do NOT read pyproject.toml (e.g., older
# pre-commit hooks, IDE plugins configured to use .isort.cfg).
#
# Usage:
#   isort .                   # sort all Python files in-place
#   isort --check-only .      # CI mode — exit 1 if any file would change
#   isort --diff .            # show changes without writing
#
# ─────────────────────────────────────────────────────────────────────────────

[isort]

# ── Profile ──────────────────────────────────────────────────────────────────
# "black" profile configures isort to be fully compatible with Black's
# formatting.  This sets:
#   multi_line_output = 3 (Vertical Hanging Indent)
#   include_trailing_comma = True
#   force_grid_wrap = 0
#   use_parentheses = True
#   ensure_newline_before_comments = True
profile = black

# ── Line Length ──────────────────────────────────────────────────────────────
# Must match Black (K-DEV-GIT-012), Ruff (K-DEV-GIT-005), and Pylint
# (K-DEV-GIT-015) to prevent reformatter fights.
line_length = 120

# ── Multi-Line Import Style ─────────────────────────────────────────────────
# Style 3 = Vertical Hanging Indent.  With include_trailing_comma, produces:
#
#   from some.module import (
#       ClassA,
#       ClassB,
#       function_c,
#   )
#
# This style gives clean single-line git diffs when adding/removing imports.
multi_line_output = 3

# ── Trailing Comma ───────────────────────────────────────────────────────────
# Forces a trailing comma after the last import in multi-line blocks.
# Required for Black compatibility (Black expects trailing commas to force
# multi-line formatting).
include_trailing_comma = True

# ── Parentheses ──────────────────────────────────────────────────────────────
# Use parentheses for multi-line imports instead of backslash continuation.
use_parentheses = True

# ── Grid Wrap Threshold ─────────────────────────────────────────────────────
# 0 = only wrap to multi-line when the import exceeds line_length.
# Non-zero values force multi-line even for short import lists.
force_grid_wrap = 0

# ── Newline Before Comments ─────────────────────────────────────────────────
# Ensure a blank line before a comment in the import section.  Prevents
# Black from moving the comment into the import statement itself.
ensure_newline_before_comments = True

# ── Section Order ────────────────────────────────────────────────────────────
# Default: FUTURE, STDLIB, THIRDPARTY, FIRSTPARTY, LOCALFOLDER
# We keep the default order.  Sections are separated by a single blank line.
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
lines_after_imports = 2

# ── Known First-Party ───────────────────────────────────────────────────────
# Packages developed in this repository.  isort places these in the
# FIRSTPARTY section, after third-party imports.
#   kai    — KAI AI orchestration layer (kai/, kai/tests/, etc.)
#   kubric — shared utilities and platform SDK
known_first_party = kai,kubric

# ── Known Third-Party ───────────────────────────────────────────────────────
# Explicitly list major dependencies so isort never misclassifies them as
# first-party (which can happen if a local module shadows a package name).
known_third_party =
    crewai,
    langchain,
    langchain_core,
    langchain_community,
    langchain_openai,
    fastapi,
    pydantic,
    pydantic_settings,
    torch,
    torchvision,
    sklearn,
    pandas,
    numpy,
    scipy,
    xgboost,
    uvicorn,
    httpx,
    sqlalchemy,
    alembic,
    celery,
    redis,
    nats,
    clearml,
    tensorboard,
    openai,
    anthropic,
    cohere,
    transformers,
    datasets,
    pymisp,
    thehive4py,
    sigma,
    stix2,
    taxii2client,
    pytest,
    hypothesis

# ── Skip Patterns ───────────────────────────────────────────────────────────
# Directories and files excluded from sorting.
skip = .git,.venv,node_modules,build,target,vendor,third_party
skip_glob = *_pb2.py,*_pb2_grpc.py,migrations/*.py

# ── Combine As Imports ──────────────────────────────────────────────────────
# Merge `import X` and `from X import Y` into a single section per package.
combine_as_imports = True

# ── Force Sort Within Sections ───────────────────────────────────────────────
# Within each section, sort imports alphabetically regardless of whether
# they are `import X` or `from X import Y`.
force_sort_within_sections = True

# ── Star Import Handling ─────────────────────────────────────────────────────
# Do not move or reorder star imports; they often have side effects (e.g.,
# `from typing import *` in stub files).
force_single_line = False
