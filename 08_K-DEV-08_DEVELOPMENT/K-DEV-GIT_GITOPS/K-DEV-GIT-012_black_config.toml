# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  K-DEV-GIT-012  Black Python Formatter Configuration                       ║
# ║  Module: Kubric-UiDR — KAI AI Orchestration Layer (Python 3.12)            ║
# ║  Format: pyproject.toml style — merge into REPO_ROOT/pyproject.toml        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Black is the uncompromising Python code formatter for the KAI layer.
# All Python files are formatted on save (VS Code settings) and enforced
# in CI via `black --check .`.
#
# NOTE: If Ruff's built-in formatter (ruff format) is used instead of Black,
# this configuration still serves as the canonical style reference.  Ruff's
# formatter is Black-compatible and respects the same settings.
#
# Usage:
#   black .                   # format all Python files
#   black --check .           # CI mode — exit 1 if any file would change
#   black --diff .            # show what would change without writing
#
# ─────────────────────────────────────────────────────────────────────────────

[tool.black]

# ── Line Length ──────────────────────────────────────────────────────────────
# 120 characters — matches Ruff (K-DEV-GIT-005), isort (K-DEV-GIT-013),
# Pylint (K-DEV-GIT-015), and the project-wide standard.
# Rationale: 120 fits comfortably on modern widescreen monitors and reduces
# unnecessary line wrapping in ML pipeline code with long parameter lists
# and FastAPI endpoint signatures.
line-length = 120

# ── Target Version ───────────────────────────────────────────────────────────
# Tells Black which Python syntax features are available, enabling it to use
# modern constructs like `match` statements, `type` aliases (3.12), and
# parenthesised context managers (3.10+).
# Must match the runtime version in Dockerfile.web and pyproject.toml.
target-version = ["py312"]

# ── Preview Mode ─────────────────────────────────────────────────────────────
# Disabled in production.  Preview enables unstable formatting changes that
# may shift between Black releases, causing noisy diffs.  Enable only in
# a dedicated formatting-upgrade PR where the full test suite is re-run.
preview = false

# ── File Inclusion ───────────────────────────────────────────────────────────
# Regex pattern for files to include.  Default matches .py and .pyi stubs.
# Explicitly stated here for documentation clarity.
include = '\.pyi?$'

# ── File Exclusion ───────────────────────────────────────────────────────────
# Regex pattern for paths to exclude.  Extends Black's built-in defaults
# (which already exclude .git, .hg, .mypy_cache, .tox, .venv, etc.).
#
# Excluded paths and rationale:
#   vendor/          — third-party vendored code; formatting is upstream's
#                      responsibility
#   migrations/      — auto-generated by Alembic; reformatting causes merge
#                      conflicts and breaks migration hashes
#   *_pb2*.py        — protobuf/gRPC generated files; regenerated by CI
#   node_modules/    — JavaScript ecosystem; not Python
#   build/           — compiled artifacts
#   target/          — Rust build directory
#   .venv/           — virtual environments
#   third_party/     — external code imported as-is
extend-exclude = '''
(
    ^vendor/
  | ^migrations/
  | _pb2\.py$
  | _pb2_grpc\.py$
  | ^node_modules/
  | ^build/
  | ^target/
  | ^\.venv/
  | ^third_party/
  | ^frontend/
)
'''

# ── String Quoting ───────────────────────────────────────────────────────────
# Black normalises all strings to double quotes by default.  This is the
# project standard — consistent with PEP 8 and the majority of the
# scientific Python ecosystem.
# To opt out on a per-string basis, use single quotes and Black will leave
# them alone (unless the string contains an apostrophe).

# ── Magic Trailing Comma ─────────────────────────────────────────────────────
# When a trailing comma is present in a collection or function signature,
# Black forces one-element-per-line formatting.  This is the desired
# behaviour — it produces cleaner git diffs and makes CI review easier.
# (This is the default; documented here for completeness.)
# skip-magic-trailing-comma = false  # default

# ── Workers ──────────────────────────────────────────────────────────────────
# Black auto-detects CPU count for parallel formatting.  No override needed
# unless running in a resource-constrained CI container, in which case set:
#   black --workers 2 .
# This is a CLI flag, not a config file option.
