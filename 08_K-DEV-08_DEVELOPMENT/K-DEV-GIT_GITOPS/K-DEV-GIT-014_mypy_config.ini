# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  K-DEV-GIT-014  mypy Type Checker Configuration                            ║
# ║  Module: Kubric-UiDR — KAI AI Orchestration Layer (Python 3.12)            ║
# ║  Format: mypy.ini / setup.cfg style                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# mypy enforces static type checking across the KAI Python codebase.
# Strict mode is enabled globally; per-module overrides relax checks for
# third-party libraries that lack type stubs.
#
# Usage:
#   mypy kai/                        # check the KAI package
#   mypy --install-types --non-interactive .  # auto-install missing stubs
#   dmypy run -- kai/                # daemon mode for IDE speed
#
# CI gate: `mypy kai/ --no-error-summary` in GitHub Actions.
# ─────────────────────────────────────────────────────────────────────────────

[mypy]

# ── Python Version ───────────────────────────────────────────────────────────
# Must match the runtime in Dockerfile.web, pyproject.toml, and all linter
# configs (Ruff, Black, Pylint).
python_version = 3.12

# ── Strict Mode ──────────────────────────────────────────────────────────────
# Enables the most rigorous type checking.  Equivalent to setting all of:
#   warn_return_any, warn_unused_configs, disallow_untyped_defs,
#   disallow_incomplete_defs, check_untyped_defs, no_implicit_optional,
#   strict_equality, warn_redundant_casts, warn_unused_ignores,
#   disallow_any_generics, disallow_subclassing_any
strict = True

# ── Additional Warnings ─────────────────────────────────────────────────────
# Warn when a function's return type is inferred as Any.
warn_return_any = True

# Warn about [mypy] config flags that are unused (e.g., typo'd module names).
warn_unused_configs = True

# Warn when a # type: ignore comment is unnecessary.
warn_unused_ignores = True

# Warn when a cast() call is redundant (the expression already has the type).
warn_redundant_casts = True

# ── Disallow Untyped Definitions ─────────────────────────────────────────────
# All functions in the KAI package must have type annotations.
disallow_untyped_defs = True

# Even partially typed functions (some args annotated, some not) are flagged.
disallow_incomplete_defs = True

# Check the bodies of functions that are untyped (type-check everything).
check_untyped_defs = True

# ── Import Discovery ────────────────────────────────────────────────────────
# Follow imports to type-check transitive dependencies that have stubs.
follow_imports = normal

# Do not silence errors from imported modules — surface them.
follow_imports_for_stubs = True

# ── Namespace Packages ───────────────────────────────────────────────────────
# Enable namespace package support (PEP 420) for the kai package tree.
namespace_packages = True

# ── Incremental & Cache ─────────────────────────────────────────────────────
# Enable incremental mode for fast re-checks on file save.
incremental = True

# Cache directory — matches .gitignore entry.
cache_dir = .mypy_cache

# ── Error Formatting ────────────────────────────────────────────────────────
# Show error codes in output so developers can write targeted `# type: ignore[code]`.
show_error_codes = True

# Show column numbers for precise error location.
show_column_numbers = True

# Show the source context around errors.
show_error_context = True

# Use colour output in terminals.
color_output = True

# Pretty-print error messages with source snippets.
pretty = True

# ── Plugins ──────────────────────────────────────────────────────────────────
# Pydantic mypy plugin: enables accurate type checking for Pydantic models
# (BaseModel, field validators, model_config).
plugins = pydantic.mypy

# ═════════════════════════════════════════════════════════════════════════════
# PYDANTIC MYPY PLUGIN SETTINGS
# ═════════════════════════════════════════════════════════════════════════════

[pydantic-mypy]
# Generate __init__ signatures from model fields.
init_forbid_extra = True
# Validate default values at model definition time.
init_typed = True
# Warn about untyped fields in model definitions.
warn_required_dynamic_aliases = True
# Warn about unused model_config values.
warn_untyped_fields = True

# ═════════════════════════════════════════════════════════════════════════════
# FIRST-PARTY MODULE OVERRIDES
# ═════════════════════════════════════════════════════════════════════════════

# kai.* — strict typing enforced; all functions must have annotations.
[mypy-kai.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True
warn_unreachable = True

# kubric.* — shared SDK; same strict typing policy.
[mypy-kubric.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True

# ═════════════════════════════════════════════════════════════════════════════
# THIRD-PARTY MODULE OVERRIDES — ignore_missing_imports
# Libraries that do not ship py.typed or have stubs on PyPI.  Grouped by
# ecosystem for maintainability.
# ═════════════════════════════════════════════════════════════════════════════

