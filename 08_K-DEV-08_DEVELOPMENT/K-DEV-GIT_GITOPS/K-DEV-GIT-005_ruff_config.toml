# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  K-DEV-GIT-005  Ruff Python Linter Configuration                           ║
# ║  Module: Kubric-UiDR — KAI AI Orchestration Layer (Python 3.12)            ║
# ║  Format: pyproject.toml style — merge into REPO_ROOT/pyproject.toml        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Ruff is the primary Python linter for the KAI layer.  It replaces Flake8,
# isort, pyupgrade, and Bandit with a single Rust-based tool that runs in
# <1 s on the full codebase.
#
# Usage:
#   ruff check .                   # lint
#   ruff check . --fix             # auto-fix safe violations
#   ruff format .                  # format (replaces Black)
#
# CI gate: `ruff check --output-format=github .` in GitHub Actions.
# ─────────────────────────────────────────────────────────────────────────────

[tool.ruff]
# ── General Settings ─────────────────────────────────────────────────────────

# Maximum line length — consistent with Black and isort configs.
line-length = 120

# Target Python version; must match the runtime in Dockerfile.web and
# pyproject.toml [project].requires-python.
target-version = "py312"

# Directories and files excluded from linting entirely.
# vendor/      — third-party vendored code, not ours to fix
# migrations/  — auto-generated by Alembic; hand-editing is discouraged
# *_pb2*.py    — protobuf generated code (tonic-build / grpcio-tools)
# .venv/       — virtual environments
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "vendor",
    "migrations",
    "*_pb2.py",
    "*_pb2_grpc.py",
    "node_modules",
    "build",
    "target",
]

# ── Lint Rule Selection ──────────────────────────────────────────────────────
[tool.ruff.lint]

# Selected rule prefixes — each maps to a well-known linter:
#   E   — pycodestyle errors (PEP 8 violations)
#   W   — pycodestyle warnings (whitespace, line continuation)
#   F   — Pyflakes (unused imports, undefined names, redefined-unused)
#   I   — isort (import ordering)
#   S   — flake8-bandit (security: hardcoded passwords, exec, eval, etc.)
#   B   — flake8-bugbear (common Python gotchas and design problems)
#   UP  — pyupgrade (modernise syntax to Python 3.12 idioms)
#   N   — pep8-naming (class, function, variable naming conventions)
#   C4  — flake8-comprehensions (simplify list/dict/set comprehensions)
#   SIM — flake8-simplify (simplifiable if/else, context managers)
#   T20 — flake8-print (ban print() in production code; use logging)
#   RUF — Ruff-specific rules (ambiguous-unicode, unused-noqa, etc.)
select = [
    "E",
    "W",
    "F",
    "I",
    "S",
    "B",
    "UP",
    "N",
    "C4",
    "SIM",
    "T20",
    "RUF",
]

# ── Ignored Rules ────────────────────────────────────────────────────────────
# Rules listed here are globally suppressed with justification.
ignore = [
    # S101 — Use of `assert` detected.  We use assert extensively in test
    # suites and in runtime invariant checks guarded by __debug__.  Test-only
    # re-enablement is handled via per-file-ignores below, but the global
    # ignore keeps noise down for assertion-heavy ML validation code.
    "S101",

    # S603, S607 — subprocess call with shell=True / partial path.  Our
    # provisioning scripts intentionally invoke system tools; each call site
    # is reviewed and input-validated.
    "S603",
    "S607",

    # E501 — Line too long.  Enforced by the formatter (line-length = 120)
    # rather than the linter, avoiding double-reporting.
    "E501",

    # B008 — Do not perform function call in argument defaults.  FastAPI's
    # Depends() / Query() / Body() require this pattern.
    "B008",

    # UP007 — Use X | Y for union types.  Some pydantic v1 models still use
    # Optional[X] for backwards compat during the v1→v2 migration.
    "UP007",

    # RUF012 — Mutable class variable without ClassVar.  Pydantic models and
    # dataclasses use mutable defaults intentionally.
    "RUF012",
]

# ── Fixable Rules ────────────────────────────────────────────────────────────
# Allow auto-fix for all enabled rules.  Unsafe fixes require --unsafe-fixes.
fixable = ["ALL"]
unfixable = []

# ── Per-File Ignores ─────────────────────────────────────────────────────────
[tool.ruff.lint.per-file-ignores]

# Test files: allow assert (S101), print debugging (T20*), magic values
# (no need for constants), and hardcoded bind addresses in test servers.
"**/tests/**/*.py" = ["S101", "T201", "T203", "S106", "S105"]
"**/test_*.py"     = ["S101", "T201", "T203", "S106", "S105"]
"conftest.py"      = ["S101", "T201"]

# Scripts and CLI entry points: allow print() for user-facing output.
"scripts/**/*.py"  = ["T201", "T203"]
"**/cli.py"        = ["T201"]
"**/manage.py"     = ["T201"]

# Jupyter notebook equivalents / experiment scripts: relaxed for data science.
"03_K-KAI-03_ORCHESTRATION/K-KAI-ML-*.py" = ["T201", "S101", "E402"]

# __init__.py: unused imports are intentional re-exports.
"__init__.py" = ["F401"]

# ── isort Settings ───────────────────────────────────────────────────────────
[tool.ruff.lint.isort]

# Black-compatible import style: trailing commas and forced multi-line when
# the import line exceeds line-length.
force-single-line   = false
force-sort-within-sections = true
combine-as-imports  = true

# First-party packages — the KAI orchestration layer modules.
known-first-party = ["kai", "kubric"]

# Third-party sections explicitly listed for deterministic ordering.
known-third-party = [
    "crewai",
    "langchain",
    "fastapi",
    "pydantic",
    "torch",
    "sklearn",
    "pandas",
    "numpy",
    "uvicorn",
    "sqlalchemy",
    "httpx",
    "celery",
    "redis",
]

# Number of lines between import sections.
lines-after-imports = 2

# ── flake8-bandit Settings ───────────────────────────────────────────────────
[tool.ruff.lint.flake8-bandit]

# Paths considered safe for hardcoded tmp directories (test fixtures).
hardcoded-tmp-directory = ["/tmp", "/var/tmp"]

# ── pep8-naming ──────────────────────────────────────────────────────────────
[tool.ruff.lint.pep8-naming]

# Allow UPPER_CASE class attribute names for ML constants (LEARNING_RATE,
# BATCH_SIZE, etc.) and pydantic model_config.
classmethod-decorators = ["classmethod", "pydantic.validator", "pydantic.field_validator"]

# ── Formatter Settings ──────────────────────────────────────────────────────
# Ruff's built-in formatter (ruff format) — Black-compatible.
[tool.ruff.format]
quote-style         = "double"
indent-style        = "space"
skip-magic-trailing-comma = false
line-ending         = "auto"
docstring-code-format     = true
docstring-code-line-length = 80
