kind: pipeline
type: docker
name: default

steps:
  - name: test
    image: golang:1.22
    commands:
      - go test -race ./...

  - name: build
    image: golang:1.22
    commands:
      - go build -o bin/ksvc ./cmd/ksvc
      - go build -o bin/noc ./cmd/noc

  - name: publish
    image: plugins/docker
    settings:
      repo: ghcr.io/managekube-hue/kubric-ksvc
      tags:
        - ${DRONE_COMMIT_SHA}
        - latest
      registry: ghcr.io
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch:
        - main
      event:
        - push
