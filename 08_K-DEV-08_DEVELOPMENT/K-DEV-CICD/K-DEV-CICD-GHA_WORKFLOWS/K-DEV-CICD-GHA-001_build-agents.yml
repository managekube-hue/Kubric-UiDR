name: Build Agents

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build binaries
        run: |
          go build ./cmd/ksvc
          go build ./cmd/noc
          go build ./cmd/vdr
          go build ./cmd/kic
          go build ./cmd/kai

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --release

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "kai[dev]"

      - name: Test
        run: pytest kai/tests/
