apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  workspaces:
    - name: source
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  steps:
    - name: clone
      image: alpine/git:2.43.0
      script: |
        git clone $(params.url) $(workspaces.source.path)
        cd $(workspaces.source.path)
        git checkout $(params.revision)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: golangci-lint
      image: golangci/golangci-lint:v1.59
      workingDir: $(workspaces.source.path)
      script: |
        golangci-lint run ./...
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: go-test
      image: golang:1.22
      workingDir: $(workspaces.source.path)
      script: |
        go test -race ./...
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push
spec:
  workspaces:
    - name: source
  params:
    - name: image
      type: string
  steps:
    - name: kaniko
      image: gcr.io/kaniko-project/executor:v1.23.0
      args:
        - --dockerfile=$(workspaces.source.path)/Dockerfile
        - --context=$(workspaces.source.path)
        - --destination=$(params.image)
        - --cache=true
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: kubric-pipeline
spec:
  workspaces:
    - name: shared-workspace
  params:
    - name: repo-url
      type: string
    - name: image
      type: string
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.repo-url)

    - name: lint
      taskRef:
        name: lint
      runAfter:
        - fetch-source
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: test
      taskRef:
        name: test
      runAfter:
        - lint
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-push
      taskRef:
        name: build-push
      runAfter:
        - test
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: image
          value: $(params.image)
