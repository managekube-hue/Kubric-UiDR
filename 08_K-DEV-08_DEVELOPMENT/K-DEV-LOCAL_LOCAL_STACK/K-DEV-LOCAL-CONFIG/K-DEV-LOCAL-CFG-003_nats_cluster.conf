# ─────────────────────────────────────────────────────────────────────
# NATS Cluster Configuration – Kubric UiDR Local Development
# ─────────────────────────────────────────────────────────────────────
# 3-node JetStream cluster for local Docker Compose development.
# Each node overrides `server_name` and `routes` via environment
# variables or per-node config includes.
#
# Start node 1:  nats-server -c nats_cluster.conf --name nats-1
# Start node 2:  nats-server -c nats_cluster.conf --name nats-2
# Start node 3:  nats-server -c nats_cluster.conf --name nats-3
# ─────────────────────────────────────────────────────────────────────

# ── Server identity ─────────────────────────────────────────────────
# Overridden per-node via --name flag or NATS_SERVER_NAME env var.
server_name: nats-1

# ── Client listener ─────────────────────────────────────────────────
listen: 0.0.0.0:4222

# ── HTTP monitoring ─────────────────────────────────────────────────
http_port: 8222

# ── Logging ──────────────────────────────────────────────────────────
debug:   false
trace:   false
logtime: true
log_file: "/var/log/nats/nats.log"
log_size_limit: 104857600  # 100 MB rotation

# ── Connection limits ───────────────────────────────────────────────
max_connections: 4096
max_payload:     8388608     # 8 MB – accommodates large OCSF events
ping_interval:   "30s"
ping_max:        5
write_deadline:  "10s"

# ── JetStream ────────────────────────────────────────────────────────
jetstream {
  store_dir:        "/data/nats/jetstream"
  max_memory_store: 1073741824   # 1 GB
  max_file_store:   10737418240  # 10 GB
  domain:           "kubric"
}

# ── Cluster ──────────────────────────────────────────────────────────
cluster {
  name: kubric-nats
  listen: 0.0.0.0:6222

  routes: [
    nats-route://nats-1:6222
    nats-route://nats-2:6222
    nats-route://nats-3:6222
  ]

  connect_retries: 120

  # Cluster-level TLS disabled for local dev; production uses mTLS.
}

# ── Leafnode listener ────────────────────────────────────────────────
# Remote Kubric agents connect as leafnodes so they can operate in
# disconnected mode and resync when connectivity is restored.
leafnodes {
  listen: 0.0.0.0:7422

  # Leafnodes auto-inherit the connecting account.
  # Production remotes would specify TLS certs here.
}

# ── Accounts & Authorization ────────────────────────────────────────
accounts {

  # ── SYS account (system / operator) ────────────────────────────────
  SYS {
    users: [
      { user: sys_admin, password: "$2a$11$SYSADMIN_BCRYPT_HASH_PLACEHOLDER" }
    ]
  }

  # ── KUBRIC account (application workloads) ─────────────────────────
  KUBRIC {
    jetstream: enabled

    users: [
      # API gateway service
      {
        user: kubric_api
        password: "$2a$11$API_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish: {
            allow: [
              "kubric.>"
              "$JS.API.>"
            ]
          }
          subscribe: {
            allow: [
              "kubric.>"
              "_INBOX.>"
              "$JS.API.>"
              "$JS.ACK.>"
            ]
          }
        }
      }

      # XRO agents (CoreSec, NetGuard, PerfTrace, Watchdog)
      {
        user: kubric_agent
        password: "$2a$11$AGENT_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish: {
            allow: [
              "kubric.events.>"
              "kubric.health.>"
              "kubric.deploy.>"
              "$JS.API.>"
            ]
          }
          subscribe: {
            allow: [
              "kubric.commands.>"
              "kubric.config.>"
              "_INBOX.>"
              "$JS.API.>"
              "$JS.ACK.>"
            ]
          }
        }
      }

      # Ingest pipeline (writes to JetStream streams)
      {
        user: kubric_ingest
        password: "$2a$11$INGEST_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish: {
            allow: [
              "kubric.events.>"
              "kubric.metrics.>"
              "$JS.API.>"
            ]
          }
          subscribe: {
            allow: [
              "_INBOX.>"
              "$JS.API.>"
              "$JS.ACK.>"
            ]
          }
        }
      }

      # KAI orchestration (CrewAI workflows, RAG queries)
      {
        user: kubric_kai
        password: "$2a$11$KAI_BCRYPT_HASH_PLACEHOLDER"
        permissions: {
          publish: {
            allow: [
              "kubric.kai.>"
              "kubric.events.enriched.>"
              "$JS.API.>"
            ]
          }
          subscribe: {
            allow: [
              "kubric.events.>"
              "kubric.kai.>"
              "_INBOX.>"
              "$JS.API.>"
              "$JS.ACK.>"
            ]
          }
        }
      }
    ]

    # ── JetStream stream templates ───────────────────────────────────
    # Streams are created by the bootstrap init container; these
    # comments serve as the declarative specification.
    #
    # Stream: EVENTS
    #   subjects: ["kubric.events.>"]
    #   retention: limits
    #   max_msgs_per_subject: 10_000_000
    #   max_bytes: 107_374_182_400  (100 GB)
    #   max_age: 7d
    #   storage: file
    #   replicas: 3
    #   discard: old
    #   duplicate_window: 2m
    #
    # Stream: HEALTH
    #   subjects: ["kubric.health.>"]
    #   retention: limits
    #   max_msgs_per_subject: 100_000
    #   max_bytes: 1_073_741_824   (1 GB)
    #   max_age: 24h
    #   storage: file
    #   replicas: 3
    #
    # Stream: COMMANDS
    #   subjects: ["kubric.commands.>"]
    #   retention: work_queue
    #   max_bytes: 1_073_741_824
    #   max_age: 1h
    #   storage: file
    #   replicas: 3
    #
    # Stream: METRICS
    #   subjects: ["kubric.metrics.>"]
    #   retention: limits
    #   max_msgs_per_subject: 1_000_000
    #   max_bytes: 10_737_418_240  (10 GB)
    #   max_age: 3d
    #   storage: file
    #   replicas: 3
    #
    # Stream: KAI
    #   subjects: ["kubric.kai.>"]
    #   retention: limits
    #   max_msgs_per_subject: 500_000
    #   max_bytes: 5_368_709_120   (5 GB)
    #   max_age: 7d
    #   storage: file
    #   replicas: 3
    #
    # Stream: DEPLOY
    #   subjects: ["kubric.deploy.>"]
    #   retention: limits
    #   max_msgs_per_subject: 100_000
    #   max_bytes: 1_073_741_824
    #   max_age: 30d
    #   storage: file
    #   replicas: 3

    # ── Subject hierarchy ────────────────────────────────────────────
    # kubric.events.<class>.<customer_id>   – OCSF normalized events
    # kubric.events.enriched.<class>.<id>   – Post-enrichment events
    # kubric.health.<agent_type>.<agent_id> – Agent heartbeats
    # kubric.commands.<agent_id>            – Control-plane → agent
    # kubric.config.<agent_type>            – Config pushes
    # kubric.metrics.<source>.<host>        – Performance metrics
    # kubric.kai.request.<workflow>         – KAI workflow triggers
    # kubric.kai.response.<workflow>        – KAI workflow results
    # kubric.deploy.<action>.<agent_id>     – Deployment lifecycle

    # ── Exports / Imports ────────────────────────────────────────────
    exports: [
      { stream: "kubric.events.>",  accounts: [SYS] }
      { stream: "kubric.health.>",  accounts: [SYS] }
    ]
  }
}

# ── System account designation ───────────────────────────────────────
system_account: SYS
