# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  K-DEV-TEST-006  pytest Configuration with xdist Parallel Execution         ║
# ║  Module: Kubric-UiDR — KAI AI Orchestration Layer (Python 3.12)            ║
# ║  Format: pytest.ini / setup.cfg [tool:pytest] style                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# pytest is the test runner for the KAI Python layer.  pytest-xdist enables
# parallel test execution across CPU cores, cutting suite runtime from
# ~12 min to ~3 min on a 4-core CI runner.
#
# Usage:
#   pytest                                  # run with config defaults
#   pytest -n 4                             # force 4 workers
#   pytest -m "not slow and not gpu"        # skip slow/GPU tests locally
#   pytest --co                             # collect-only (dry run)
#   pytest -k "test_sigma"                  # run only matching tests
#
# CI invocation (GitHub Actions):
#   pytest --junitxml=reports/junit.xml --cov=kai --cov-report=xml
#
# ─────────────────────────────────────────────────────────────────────────────

[tool:pytest]

# ── Default Command-Line Options ────────────────────────────────────────────
# -n auto             — pytest-xdist: spawn one worker per available CPU core.
#                       Falls back to serial execution if xdist is not
#                       installed (e.g., minimal dev setup).
#
# --dist=loadscope   — group tests by module/class so that module-level
#                       fixtures (e.g., model loading, DB setup) run once per
#                       worker rather than per-test.  This is critical for
#                       ML tests where model init takes 5–10 s.
#
# --strict-markers   — fail if a test uses an unregistered marker.  Prevents
#                       typos like @pytest.mark.integation from silently
#                       passing.
#
# -v                 — verbose output: show individual test names and status.
#
# --tb=short         — shorter tracebacks in CI output; use --tb=long for
#                       local debugging.
#
# -ra                — show summary of all non-passing tests (failed, error,
#                       skipped, xfailed) at the end of the run.
#
# --strict-config    — fail on any unrecognised config key (catches typos in
#                       this file).
addopts =
    -n auto
    --dist=loadscope
    --strict-markers
    --strict-config
    -v
    --tb=short
    -ra

# ── Test Discovery ──────────────────────────────────────────────────────────
# Root directories for test collection.
testpaths =
    kai/tests
    tests

# Python file patterns containing tests.
python_files = test_*.py *_test.py

# Python class patterns containing tests.
python_classes = Test*

# Python function patterns containing tests.
python_functions = test_*

# ── Async Mode ───────────────────────────────────────────────────────────────
# pytest-asyncio: auto mode means any `async def test_*` function is
# automatically treated as an async test without needing @pytest.mark.asyncio.
# Requires pytest-asyncio >= 0.21.
asyncio_mode = auto

# ── Markers ──────────────────────────────────────────────────────────────────
# All custom markers must be declared here (--strict-markers enforces this).
markers =
    slow: marks tests as slow (>10 s) — excluded from default local runs with `-m "not slow"`
    integration: marks tests that require external services (NATS, PostgreSQL, Redis, MISP)
    gpu: marks tests that require a CUDA/ROCm GPU — skipped on CPU-only runners
    network: marks tests that require outbound network access (API calls, model downloads)
    e2e: marks end-to-end tests spanning multiple KAI subsystems
    unit: marks pure unit tests with no external dependencies
    smoke: marks smoke tests run on every PR — fast, high-signal subset
    benchmark: marks performance benchmark tests — run on dedicated hardware only
    security: marks security-focused tests (YARA rule validation, Sigma parsing, IOC checks)
    model: marks tests that load ML models (candle, transformers, xgboost)

# ── Minimum pytest Version ──────────────────────────────────────────────────
minversion = 8.0

# ── Warning Filters ──────────────────────────────────────────────────────────
# Suppress known deprecation warnings from third-party libraries that we
# cannot fix.  Each filter includes the source package for traceability.
filterwarnings =
    # Treat all warnings as errors by default — forces us to address them.
    error

    # ── Known Third-Party Deprecations ──────────────────────────────────────
    # pydantic v1 compatibility layer used by langchain.
    ignore::DeprecationWarning:pydantic.*

    # transformers: future warning about model loading paths.
    ignore::FutureWarning:transformers.*

    # torch: various deprecation warnings across minor versions.
    ignore::DeprecationWarning:torch.*
    ignore::FutureWarning:torch.*
    ignore::UserWarning:torch.*

    # sklearn: convergence and feature deprecation warnings.
    ignore::FutureWarning:sklearn.*
    ignore::DeprecationWarning:sklearn.*

    # numpy: dtype deprecation warnings in numpy 2.x.
    ignore::DeprecationWarning:numpy.*

    # clearml: internal deprecation warnings.
    ignore::DeprecationWarning:clearml.*

    # grpc: protobuf deprecation warnings.
    ignore::DeprecationWarning:google.protobuf.*
    ignore::DeprecationWarning:grpc.*

    # pytest-asyncio: mode deprecation (already set to auto).
    ignore::DeprecationWarning:pytest_asyncio.*

    # sqlalchemy: RemovedIn20Warning during migration period.
    ignore::DeprecationWarning:sqlalchemy.*

    # ResourceWarning from unclosed sockets in test teardown.
    ignore::ResourceWarning

# ── Coverage (pytest-cov) ───────────────────────────────────────────────────
# These settings apply when --cov is passed on the command line.
# Not in addopts because coverage slows parallel xdist runs; enabled
# explicitly in CI only.
#
# Configuration is in pyproject.toml [tool.coverage.run] and
# [tool.coverage.report], but key defaults are:
#   --cov=kai                # measure coverage of the kai package
#   --cov-report=xml         # Cobertura XML for Codecov upload
#   --cov-report=term-missing  # terminal summary showing uncovered lines
#   --cov-fail-under=80      # fail if coverage drops below 80%

# ── Logging ──────────────────────────────────────────────────────────────────
# Capture log output during tests and display it on failure.
log_cli = false
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging for CI artifact collection.
log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s (%(filename)s:%(lineno)d): %(message)s
log_file_date_format = %Y-%m-%dT%H:%M:%S

# ── Timeout (pytest-timeout) ────────────────────────────────────────────────
# Global per-test timeout.  Prevents hung tests from blocking CI forever.
# Override per-test with @pytest.mark.timeout(seconds).
timeout = 120

# ── Temporary Directories ───────────────────────────────────────────────────
# Use the system temp directory for test artifacts; avoids polluting the repo.
tmp_path_retention_policy = none

# ── xdist Worker Configuration ──────────────────────────────────────────────
# When running with -n auto, each worker gets an isolated tmp directory and
# a unique PYTEST_XDIST_WORKER environment variable (gw0, gw1, ...).
# Use this in fixtures to partition shared resources:
#
#   @pytest.fixture
#   def nats_subject(worker_id):
#       return f"test.{worker_id}.events"
#
# The loadscope scheduler groups tests by module, so module-scoped fixtures
# (e.g., model loading) execute once per worker, not once per test.
