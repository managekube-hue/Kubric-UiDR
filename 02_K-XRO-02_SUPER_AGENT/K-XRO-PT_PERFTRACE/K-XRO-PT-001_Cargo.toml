[package]
name = "perftrace"
version = "0.1.0"
edition = "2021"
description = "Kubric K-XRO-PT PerfTrace agent — host performance metrics via sysinfo, Linux perf_event, Prometheus, and OpenTelemetry"
authors = ["Kubric Platform Team"]
license = "MIT"

[[bin]]
name = "perftrace"
path = "K-XRO-PT-SRC/K-XRO-PT-001_main.rs"

# ─── Runtime & async ─────────────────────────────────────────────────────────
[dependencies]
tokio = { version = "1", features = ["full"] }

# ─── Error handling ───────────────────────────────────────────────────────────
anyhow   = "1"
thiserror = "1"

# ─── Serialisation ────────────────────────────────────────────────────────────
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# ─── Host metrics ─────────────────────────────────────────────────────────────
# sysinfo 0.33 (stable) — CPU, memory, disk, network, process APIs
sysinfo = "0.33"

# ─── Messaging ────────────────────────────────────────────────────────────────
async-nats = "0.39"

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus = "0.13"

# ─── HTTP server (Prometheus /metrics + /healthz) ────────────────────────────
axum  = { version = "0.7", features = ["json"] }
tower = "0.4"

# ─── Linux perf_event FFI ─────────────────────────────────────────────────────
libc = "0.2"

# ─── OpenTelemetry ────────────────────────────────────────────────────────────
opentelemetry                  = { version = "0.27", features = ["metrics", "trace"] }
opentelemetry-otlp             = { version = "0.27", features = ["grpc-tonic", "metrics", "trace"] }
opentelemetry_sdk              = { version = "0.27", features = ["rt-tokio", "metrics", "trace"] }
opentelemetry-semantic-conventions = "0.27"

# ─── gRPC transport (required by opentelemetry-otlp tonic feature) ────────────
tonic = "0.12"

# ─── Logging / tracing ────────────────────────────────────────────────────────
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# ─── Dev / test dependencies ──────────────────────────────────────────────────
[dev-dependencies]
tokio = { version = "1", features = ["full", "macros", "rt-multi-thread"] }

# ─── Build profiles ───────────────────────────────────────────────────────────
[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = true        # strip debug symbols to reduce binary size
panic         = "abort"     # saves ~10 kB on musl targets

[profile.dev]
opt-level = 0
debug     = true

# ─── Windows: link wpcap/npcap for libc raw-socket support ──────────────────
[target.'cfg(windows)'.build-dependencies]
# winres = "0.1"   # uncomment to embed a Windows version resource
