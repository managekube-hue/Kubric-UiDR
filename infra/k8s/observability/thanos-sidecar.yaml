# K-K8S-OBS-002 — Thanos Sidecar
# Long-term Prometheus metrics storage — uploads to MinIO/S3
# Provides global query across multiple Prometheus instances
#
# Install: helm install thanos bitnami/thanos -n monitoring

# Thanos Sidecar injected into Prometheus pod
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: kubric
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kubric
spec:
  replicas: 2
  retention: 6h  # Short local retention — Thanos handles long-term
  thanos:
    version: v0.34.1
    objectStorageConfig:
      name: thanos-objstore-config
      key: objstore.yml
  serviceMonitorSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  ruleSelector:
    matchLabels:
      release: kube-prom
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
# Thanos object store config (MinIO)
apiVersion: v1
kind: Secret
metadata:
  name: thanos-objstore-config
  namespace: monitoring
type: Opaque
stringData:
  objstore.yml: |
    type: S3
    config:
      bucket: kubric-thanos
      endpoint: minio.kubric.svc.cluster.local:9000
      access_key: "${MINIO_ACCESS_KEY}"
      secret_key: "${MINIO_SECRET_KEY}"
      insecure: true
---
# Thanos Query — federates metrics from multiple clusters
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-query
    app.kubernetes.io/part-of: kubric
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-query
    spec:
      containers:
        - name: thanos-query
          image: quay.io/thanos/thanos:v0.34.1
          args:
            - query
            - --store=dnssrv+_grpc._tcp.thanos-store.monitoring.svc.cluster.local
            - --store=dnssrv+_grpc._tcp.prometheus-kubric-thanos-sidecar.monitoring.svc.cluster.local
            - --query.auto-downsampling
          ports:
            - name: http
              containerPort: 10902
            - name: grpc
              containerPort: 10901
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
# Thanos Compactor — deduplicates and downsamples
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-compact
  namespace: monitoring
spec:
  serviceName: thanos-compact
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-compact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-compact
    spec:
      containers:
        - name: thanos-compact
          image: quay.io/thanos/thanos:v0.34.1
          args:
            - compact
            - --data-dir=/data
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --retention.resolution-raw=30d
            - --retention.resolution-5m=180d
            - --retention.resolution-1h=365d
            - --wait
          volumeMounts:
            - name: data
              mountPath: /data
            - name: objstore-config
              mountPath: /etc/thanos
          resources:
            requests:
              cpu: "500m"
              memory: 2Gi
      volumes:
        - name: objstore-config
          secret:
            secretName: thanos-objstore-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
