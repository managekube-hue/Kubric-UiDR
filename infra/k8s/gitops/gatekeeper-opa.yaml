# K-K8S-GO-005 — Gatekeeper OPA Admission Policy
# Enforces OPA Rego policies as K8s admission webhook
# Prevents non-compliant pods from deploying in Kubric cluster
#
# Install: helm install gatekeeper open-policy-agent/gatekeeper -n gatekeeper-system

# ConstraintTemplate: require kubric labels
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: kubricrequiredlabels
spec:
  crd:
    spec:
      names:
        kind: KubricRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package kubricrequiredlabels

        violation[{"msg": msg}] {
          provided := {label | input.review.object.metadata.labels[label]}
          required := {label | label := input.parameters.labels[_]}
          missing := required - provided
          count(missing) > 0
          msg := sprintf("Missing required labels: %v", [missing])
        }
---
# Constraint: all kubric pods must have part-of and component labels
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: KubricRequiredLabels
metadata:
  name: kubric-pod-labels
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces: ["kubric"]
  parameters:
    labels:
      - "app.kubernetes.io/name"
      - "app.kubernetes.io/part-of"
---
# ConstraintTemplate: require resource limits
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: kubricresourcelimits
spec:
  crd:
    spec:
      names:
        kind: KubricResourceLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package kubricresourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container '%v' must have CPU limits", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container '%v' must have memory limits", [container.name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: KubricResourceLimits
metadata:
  name: kubric-resource-limits
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["kubric"]
---
# ConstraintTemplate: only allow signed images
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: kubricallowedregistries
spec:
  crd:
    spec:
      names:
        kind: KubricAllowedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package kubricallowedregistries

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not any({true | reg := input.parameters.registries[_]; startswith(container.image, reg)})
          msg := sprintf("Container '%v' image '%v' is not from an allowed registry", [container.name, container.image])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: KubricAllowedRegistries
metadata:
  name: kubric-allowed-registries
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["kubric"]
  parameters:
    registries:
      - "ghcr.io/kubric/"
      - "ghcr.io/managekube-hue/"
      - "docker.io/library/"
      - "nats:"
      - "clickhouse/"
      - "postgres:"
      - "grafana/"
