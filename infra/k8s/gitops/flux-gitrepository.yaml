# K-K8S-GO-002 — Flux GitRepository
# Alternative GitOps CD to ArgoCD — lighter weight, Helm-native
# Use Flux for Helm chart-based deployments; ArgoCD for kustomize-based
#
# Install: flux install

# Source: Gitea monorepo
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kubric
  namespace: flux-system
spec:
  interval: 1m
  url: https://gitea.kubric.internal/kubric/Kubric-UiDR.git
  ref:
    branch: main
  secretRef:
    name: gitea-credentials
---
# Kustomization: deploy base manifests
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubric-base
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/k8s/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubric
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: k-svc
      namespace: kubric
    - apiVersion: apps/v1
      kind: Deployment
      name: kai-core
      namespace: kubric
---
# Kustomization: deploy Helm chart values
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubric-helm-values
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/helm/values
  prune: false
  sourceRef:
    kind: GitRepository
    name: kubric
  dependsOn:
    - name: kubric-base
---
# HelmRepository: third-party charts
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: nats
  namespace: flux-system
spec:
  interval: 1h
  url: https://nats-io.github.io/k8s/helm/charts
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.bitnami.com/bitnami
