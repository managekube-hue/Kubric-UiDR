# K-K8S-POL-001 — SealedSecrets Controller
# Encrypts K8s secrets with cluster pubkey — safe to store in Gitea
# Decrypted only inside the K8s cluster
#
# Install: helm install sealed-secrets bitnami/sealed-secrets -n kube-system
# CLI: brew install kubeseal

# SealedSecret for ClickHouse credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: clickhouse-credentials
  namespace: kubric
spec:
  encryptedData:
    # kubeseal --cert kubric-cert.pem < secret.yaml > sealed-secret.yaml
    # Values below are placeholders — encrypt with: kubeseal --format yaml
    username: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
  template:
    metadata:
      name: clickhouse-credentials
      namespace: kubric
    type: Opaque
---
