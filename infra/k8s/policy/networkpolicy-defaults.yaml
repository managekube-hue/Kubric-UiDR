# K-K8S-POL-002 — NetworkPolicy Defaults
# Default deny + explicit allow for all Kubric namespace traffic
# Works with Cilium CNI (CiliumNetworkPolicy is more granular; this is baseline)

# Default deny all ingress and egress in kubric namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kubric
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: kubric
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow intra-namespace communication (kubric pods -> kubric pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubric
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubric
---
# Allow NATS client connections from all kubric pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nats-client
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubric
      ports:
        - protocol: TCP
          port: 4222
---
# Allow ClickHouse connections from services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-clickhouse
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubric
      ports:
        - protocol: TCP
          port: 8123
        - protocol: TCP
          port: 9000
---
# Allow PostgreSQL connections from services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubric
      ports:
        - protocol: TCP
          port: 5432
---
# Allow ingress from monitoring namespace (Prometheus scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
---
# Allow egress to monitoring namespace (OTel trace export)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-export
  namespace: kubric
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
