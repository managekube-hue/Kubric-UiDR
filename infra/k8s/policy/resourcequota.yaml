# K-K8S-POL-003 — ResourceQuota
# Enforces resource limits per namespace to prevent runaway pods

# Kubric namespace resource quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kubric-resource-quota
  namespace: kubric
spec:
  hard:
    # Compute
    requests.cpu: "32"
    requests.memory: 64Gi
    limits.cpu: "64"
    limits.memory: 128Gi
    # Storage
    requests.storage: 2Ti
    persistentvolumeclaims: "20"
    # Objects
    pods: "100"
    services: "30"
    configmaps: "50"
    secrets: "50"
    replicationcontrollers: "20"
---
# LimitRange — defaults for pods without explicit resource requests
apiVersion: v1
kind: LimitRange
metadata:
  name: kubric-limit-range
  namespace: kubric
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "16"
        memory: 64Gi
      min:
        cpu: "50m"
        memory: 64Mi
    - type: PersistentVolumeClaim
      max:
        storage: 500Gi
      min:
        storage: 1Gi
---
# Monitoring namespace resource quota (lighter)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-resource-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
    persistentvolumeclaims: "15"
