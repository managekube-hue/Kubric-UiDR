# K-K8S-003 — PostgreSQL StatefulSet
# PSA/billing relational store with RLS, TLS, WAL archiving
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: kubric
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: data-lakehouse
spec:
  serviceName: postgresql-headless
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/part-of: kubric
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      initContainers:
        - name: init-schema
          image: postgres:16-alpine
          command: ["sh", "-c", "cp /init-scripts/*.sql /docker-entrypoint-initdb.d/"]
          volumeMounts:
            - name: init-scripts
              mountPath: /init-scripts
              readOnly: true
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kubric
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql
            - name: tls
              mountPath: /etc/postgresql/tls
              readOnly: true
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kubric"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubric"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: postgresql-config
        - name: tls
          secret:
            secretName: postgresql-tls
        - name: init-scripts
          configMap:
            name: postgresql-init-scripts
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: kubric
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgres
      port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: kubric
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgres
      port: 5432
