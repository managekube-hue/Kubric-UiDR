apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubric

resources:
  - namespace.yaml
  - k-svc.yaml
  - vdr.yaml
  - kic.yaml
  - noc.yaml
  - kai-core.yaml
  - n8n.yaml
  - grafana-provisioning.yaml

# Grafana dashboards loaded from files — ConfigMap always in sync with source JSON.
# `kustomize build infra/k8s/base/` inlines the JSON at build time; no placeholders.
configMapGenerator:
  - name: grafana-dashboards-kubric
    namespace: kubric
    options:
      disableNameSuffixHash: true
      labels:
        grafana/dashboard: "true"
        app.kubernetes.io/part-of: kubric
    files:
      - kubric-platform.json=../../grafana/dashboards/kubric-platform.json
      - kubric-customer.json=../../grafana/dashboards/kubric-customer.json

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
