---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
spec:
  selector:
    app: kic
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kic
  template:
    metadata:
      labels:
        app: kic
        app.kubernetes.io/name: kic
        app.kubernetes.io/part-of: kubric
        kubric/tenant-aware: "true"
    spec:
      serviceAccountName: kic
      containers:
        - name: kic
          image: kubric/kic:latest
          ports:
            - containerPort: 8082
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 30
            initialDelaySeconds: 15
