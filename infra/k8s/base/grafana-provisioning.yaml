---
# infra/k8s/base/grafana-provisioning.yaml
# ConfigMap for Grafana alert rule provisioning.
#
# Dashboard JSON ConfigMap is generated by kustomization.yaml configMapGenerator
# from infra/grafana/dashboards/*.json — no placeholders needed here.
#
# Referenced by infra/helm/values/grafana-values.yaml:
#   sidecar.dashboards.enabled = true
#   sidecar.dashboards.labelValue = "true"

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-kubric
  namespace: kubric
  labels:
    app.kubernetes.io/part-of: kubric
data:
  platform-alerts.yaml: |
    apiVersion: 1
    groups:
      - name: Platform Critical Alerts
        folder: Kubric Platform
        interval: 1m
        rules:
          - uid: nats-consumer-lag
            title: "NATS Consumer Lag Critical"
            condition: C
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "NATS consumer lag critical — events not being processed"
              runbook: "https://wiki.kubric.io/runbooks/nats-consumer-lag"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: sum(nats_consumer_num_pending)
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [10000], type: gt}
                      query: {params: [A]}
                      reducer: {params: [], type: last}

          - uid: clickhouse-insert-rate-zero
            title: "ClickHouse Ingestion Stopped"
            condition: C
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "ClickHouse ingestion stopped — check NATS bridge"
              runbook: "https://wiki.kubric.io/runbooks/clickhouse-ingestion"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: rate(clickhouse_written_rows_total[2m])
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [0], type: eq}
                      query: {params: [A]}
                      reducer: {params: [], type: last}

          - uid: vault-sealed
            title: "Vault Is Sealed"
            condition: C
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "VAULT IS SEALED — all services will fail secret lookups"
              runbook: "https://wiki.kubric.io/runbooks/vault-sealed"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: vault_core_unsealed
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [1], type: lt}
                      query: {params: [A]}
                      reducer: {params: [], type: last}

          - uid: agent-heartbeat-gap
            title: "Agent Heartbeat Gap"
            condition: C
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Agent has not reported a heartbeat in 5 min"
              runbook: "https://wiki.kubric.io/runbooks/agent-heartbeat"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: time() - kubric_agent_last_heartbeat_seconds
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [300], type: gt}
                      query: {params: [A]}
                      reducer: {params: [], type: last}

          - uid: temporal-workflow-failure
            title: "Temporal Workflow Failure Rate High"
            condition: C
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Temporal workflow failure rate exceeds 5%"
              runbook: "https://wiki.kubric.io/runbooks/temporal-failures"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: rate(temporal_workflow_failed_total[5m]) / rate(temporal_workflow_completed_total[5m])
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [0.05], type: gt}
                      query: {params: [A]}
                      reducer: {params: [], type: last}

          - uid: pod-crashloopbackoff
            title: "Pod CrashLoopBackOff in kubric namespace"
            condition: C
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Pod is in CrashLoopBackOff — check logs"
              runbook: "https://wiki.kubric.io/runbooks/crashloopbackoff"
            data:
              - refId: A
                queryType: prometheus
                model:
                  expr: sum(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",namespace="kubric"})
              - refId: C
                queryType: classic_conditions
                model:
                  conditions:
                    - type: query
                      evaluator: {params: [0], type: gt}
                      query: {params: [A]}
                      reducer: {params: [], type: last}
