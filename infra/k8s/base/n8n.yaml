---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: kubric
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: kubric
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: kubric
spec:
  selector:
    app: n8n
  ports:
    - name: http
      port: 5678
      targetPort: 5678
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: kubric
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/name: n8n
        app.kubernetes.io/part-of: kubric
        kubric/tenant-aware: "true"
    spec:
      serviceAccountName: n8n
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          ports:
            - containerPort: 5678
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: http
            # Encryption key and DB creds injected via External Secrets Operator
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            periodSeconds: 30
            initialDelaySeconds: 15
