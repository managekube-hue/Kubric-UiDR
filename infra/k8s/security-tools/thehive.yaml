# ============================================================
# TheHive 5.4.6 — kubric-security namespace
# Exposes:
#   - 9000 (HTTP REST API + UI)
# Uses BerkeleyJE (embedded) for dev; swap to Cassandra for prod.
# ============================================================

---
# ConfigMap: thehive-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: thehive-config
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/component: soar
data:
  application.conf: |
    # TheHive 5 application configuration
    # IMPORTANT: Change play.http.secret.key before any production deployment.

    play.http.secret.key = "kubric-thehive-secret-change-in-production"

    # ── Database ─────────────────────────────────────────────────────────────
    # BerkeleyJE is suitable for single-node / development deployments.
    # For production, switch to:
    #   storage.provider = cassandra  (or janusgraph.storage.backend = cql)
    db.janusgraph {
      storage.backend  = berkeleyje
      storage.directory = /opt/thehive/data/db

      ## Index backend — Lucene for embedded; switch to Elasticsearch in prod.
      index.search.backend    = lucene
      index.search.directory  = /opt/thehive/data/index
    }

    # ── File storage ─────────────────────────────────────────────────────────
    storage {
      provider       = localfs
      localfs.location = /opt/thehive/data/files
    }

    # ── Authentication ────────────────────────────────────────────────────────
    auth {
      providers = [
        { name = session }
        { name = basic, realm = thehive }
        { name = local }
      ]
      defaultUserDomain = "local"
    }

    # ── Cortex integration ───────────────────────────────────────────────────
    # Uncomment and set the Cortex API key once Cortex is deployed.
    # play.modules.enabled += org.thp.thehive.connector.cortex.CortexModule
    # cortex {
    #   servers = [
    #     {
    #       name     = "Cortex-Kubric"
    #       url      = "http://cortex.kubric-security.svc.cluster.local:9001"
    #       auth.type = "bearer"
    #       auth.key  = "REPLACE_WITH_CORTEX_API_KEY"
    #       wsConfig {}
    #     }
    #   ]
    # }

    # ── MISP integration ──────────────────────────────────────────────────────
    # play.modules.enabled += org.thp.thehive.connector.misp.MispModule
    # misp {
    #   interval = 1 hour
    #   servers = [
    #     {
    #       name    = "MISP-Kubric"
    #       url     = "https://misp.kubric-security.svc.cluster.local"
    #       auth.type = "key"
    #       auth.key  = "REPLACE_WITH_MISP_API_KEY"
    #       tags    = ["kubric", "misp"]
    #     }
    #   ]
    # }

    # ── HTTP / Play settings ──────────────────────────────────────────────────
    play.http.parser.maxDiskBuffer  = 128m
    play.http.parser.maxMemoryBuffer = 256k

    # Graceful shutdown
    play.server.akka.requestTimeout = null

---
# PersistentVolumeClaim: thehive-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thehive-data
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/component: soar
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# Deployment: thehive
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thehive
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/version: "5.4.6"
    app.kubernetes.io/component: soar
spec:
  replicas: 1
  strategy:
    type: Recreate    # BerkeleyJE / localfs do not support concurrent writers
  selector:
    matchLabels:
      app.kubernetes.io/name: thehive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thehive
        app.kubernetes.io/version: "5.4.6"
        app.kubernetes.io/component: soar
      annotations:
        checksum/config: "change-via-kustomize-or-helm-hash"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      terminationGracePeriodSeconds: 60
      initContainers:
        # TheHive requires its data directories to exist before startup.
        - name: init-dirs
          image: busybox:1.36.1
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p \
                /opt/thehive/data/db \
                /opt/thehive/data/index \
                /opt/thehive/data/files && \
              chown -R 1000:1000 /opt/thehive/data
          volumeMounts:
            - name: thehive-data
              mountPath: /opt/thehive/data
      containers:
        - name: thehive
          image: strangebee/thehive:5.4.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          env:
            - name: JVM_OPTS
              value: "-Xms1g -Xmx2g"
            # Config file path expected by the Docker entrypoint
            - name: TH_NO_CONFIG
              value: "1"   # disable auto-config; we supply our own application.conf
          command:
            - /opt/thehive/entrypoint
            - --config-file
            - /etc/thehive/application.conf
            - -Dplay.server.http.port=9000
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: thehive-config
              mountPath: /etc/thehive
              readOnly: true
            - name: thehive-data
              mountPath: /opt/thehive/data
          livenessProbe:
            httpGet:
              path: /api/v1/status/public
              port: http
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/status/public
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: thehive-config
          configMap:
            name: thehive-config
        - name: thehive-data
          persistentVolumeClaim:
            claimName: thehive-data

---
# Service: thehive
apiVersion: v1
kind: Service
metadata:
  name: thehive
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: thehive
    app.kubernetes.io/component: soar
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: thehive
  ports:
    - name: http
      port: 9000
      targetPort: http
      protocol: TCP
