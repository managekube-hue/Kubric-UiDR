# ============================================================
# Velociraptor 0.73 — kubric-security namespace
# Exposes:
#   - 8000 (GUI / HTTPS)
#   - 8001 (frontend gRPC for clients + API)
#   - 8003 (monitoring / health)
# ============================================================

---
# ServiceAccount: velociraptor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velociraptor
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/component: dfir
automountServiceAccountToken: false

---
# ConfigMap: velociraptor-config
# Minimal server configuration.
# In production, generate a full config with:
#   velociraptor config generate -i
# and store it in a Secret (or ESO-backed ExternalSecret).
apiVersion: v1
kind: ConfigMap
metadata:
  name: velociraptor-config
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/component: dfir
data:
  server.config.yaml: |
    # Velociraptor server configuration
    # Generated for Kubric platform — adjust before production use.

    version:
      name: velociraptor
      version: 0.73.0

    Client:
      server_urls:
        - https://velociraptor:8000/
      use_self_signed_ssl: true
      # Clients verify the pinned server certificate; set to the fingerprint of
      # your CA cert once you have generated a real PKI with `velociraptor config generate`.
      ca_certificate: ""
      nonce: "kubric-change-me"
      writeback_linux: /tmp/velociraptor.writeback.yaml
      writeback_windows: $ProgramFiles\Velociraptor\velociraptor.writeback.yaml
      tempdir_windows: $ProgramFiles\Velociraptor\Tools

    API:
      bind_address: 0.0.0.0
      bind_port: 8001
      bind_scheme: tcp

    GUI:
      bind_address: 0.0.0.0
      bind_port: 8000
      # Set to false and configure TLS in production.
      use_plain_http: true
      # Allowed CORS origins — restrict to your ingress hostname in production.
      allowed_cidr:
        - 0.0.0.0/0

    Frontend:
      bind_address: 0.0.0.0
      bind_port: 8001
      bind_scheme: tcp
      # Certificate and private key for client-facing TLS.
      # Leave empty only in dev; in production inject from a Secret.
      certificate: ""
      private_key: ""

    Monitoring:
      bind_address: 0.0.0.0
      bind_port: 8003

    Datastore:
      implementation: FileBaseDataStore
      location: /velociraptor/datastore
      filestore_directory: /velociraptor/filestore

    Logging:
      output_directory: /velociraptor/logs
      separate_logs_per_component: true
      rotation_time: 86400
      max_age: 7776000   # 90 days

    Mail: {}
    Alerts: {}

---
# PersistentVolumeClaim: velociraptor-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: velociraptor-data
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/component: dfir
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# StatefulSet: velociraptor
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: velociraptor
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/version: "0.73.0"
    app.kubernetes.io/component: dfir
spec:
  replicas: 1
  serviceName: velociraptor-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: velociraptor
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velociraptor
        app.kubernetes.io/version: "0.73.0"
        app.kubernetes.io/component: dfir
      annotations:
        checksum/config: "change-via-kustomize-or-helm-hash"
    spec:
      serviceAccountName: velociraptor
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0      # Velociraptor requires root for raw socket access
        fsGroup: 0
      terminationGracePeriodSeconds: 60
      initContainers:
        # Ensure data directories exist with correct permissions.
        - name: init-dirs
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p \
                /velociraptor/datastore \
                /velociraptor/filestore \
                /velociraptor/logs && \
              chmod -R 700 /velociraptor
          volumeMounts:
            - name: velociraptor-data
              mountPath: /velociraptor
      containers:
        - name: velociraptor
          image: velocidex/velociraptor:v0.73.0
          imagePullPolicy: IfNotPresent
          args:
            - frontend
            - --config
            - /etc/velociraptor/server.config.yaml
          ports:
            - name: gui
              containerPort: 8000
              protocol: TCP
            - name: frontend
              containerPort: 8001
              protocol: TCP
            - name: monitoring
              containerPort: 8003
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: velociraptor-config
              mountPath: /etc/velociraptor
              readOnly: true
            - name: velociraptor-data
              mountPath: /velociraptor
          livenessProbe:
            httpGet:
              path: /app/index.html
              port: gui
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /app/index.html
              port: gui
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: velociraptor-config
          configMap:
            name: velociraptor-config
        - name: velociraptor-data
          persistentVolumeClaim:
            claimName: velociraptor-data

---
# Headless Service (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: velociraptor-headless
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/component: dfir
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: velociraptor
  ports:
    - name: gui
      port: 8000
      targetPort: gui
    - name: frontend
      port: 8001
      targetPort: frontend
    - name: monitoring
      port: 8003
      targetPort: monitoring

---
# Service: velociraptor (ClusterIP for internal consumers)
apiVersion: v1
kind: Service
metadata:
  name: velociraptor
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: velociraptor
    app.kubernetes.io/component: dfir
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: velociraptor
  ports:
    - name: gui
      port: 8000
      targetPort: gui
      protocol: TCP
    - name: frontend
      port: 8001
      targetPort: frontend
      protocol: TCP
    - name: monitoring
      port: 8003
      targetPort: monitoring
      protocol: TCP
