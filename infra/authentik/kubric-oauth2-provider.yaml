# infra/authentik/kubric-oauth2-provider.yaml
# Authentik Blueprint — defines the OAuth2/OIDC provider + application
# for the Kubric customer portal and Go APIs.
#
# Applied via Authentik's blueprint system (managed Terraform-style).
# Upload to Authentik after deployment:
#   kubectl cp kubric-oauth2-provider.yaml \
#     authentik/authentik-server-0:/blueprints/custom/kubric.yaml
#   kubectl exec -n authentik authentik-server-0 -- ak apply_blueprint kubric
#
# Or use the Authentik API:
#   POST /api/v3/managed/blueprints/ with this YAML as body.
---
version: 1
metadata:
  name: kubric-oauth2
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # OAuth2/OIDC Provider
  - model: authentik_providers_oauth2.oauth2provider
    id: kubric-oidc-provider
    attrs:
      name: Kubric Platform OIDC
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      # client_id and client_secret are auto-generated by Authentik
      redirect_uris: |
        https://app.kubric.security/api/auth/callback/authentik
        http://localhost:3000/api/auth/callback/authentik
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      # Custom scope mapping for Kubric roles
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      access_token_validity: hours=1
      refresh_token_validity: days=30

  # Authentik Application
  - model: authentik_core.application
    id: kubric-app
    attrs:
      name: Kubric Security Platform
      slug: kubric
      provider: !KeyOf kubric-oidc-provider
      meta_launch_url: https://app.kubric.security
      meta_icon: https://app.kubric.security/favicon.ico

  # Group → Role mapping for RBAC
  # These groups map to JWT groups claim used by internal/middleware/rbac.go
  - model: authentik_core.group
    id: kubric-admins
    attrs:
      name: kubric:admin
      is_superuser: false

  - model: authentik_core.group
    id: kubric-analysts
    attrs:
      name: kubric:analyst
      is_superuser: false

  - model: authentik_core.group
    id: kubric-agents
    attrs:
      name: kubric:agent
      is_superuser: false

  - model: authentik_core.group
    id: kubric-readonly
    attrs:
      name: kubric:readonly
      is_superuser: false
