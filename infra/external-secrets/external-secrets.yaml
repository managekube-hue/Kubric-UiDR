# infra/external-secrets/external-secrets.yaml
# ExternalSecret resources that sync Vault KV-v2 secrets into K8s Secrets.
# Each secret maps a Vault path → K8s Secret in the kubric namespace.
# NO secrets are stored in git — Vault is the single source of truth.

---
# JWT signing key for internal/middleware/jwt.go
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kubric-jwt-secret
  namespace: kubric
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kubric-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: KUBRIC_JWT_SECRET
      remoteRef:
        key: secret/kubric/jwt
        property: signing_key

