name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-staging:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy via kustomize
        run: |
          # Update image tags to current commit SHA
          cd infra/k8s/overlays/dev
          kustomize edit set image \
            kubric/k-svc=${{ env.REGISTRY }}/kubric/k-svc:${{ env.IMAGE_TAG }} \
            kubric/vdr=${{ env.REGISTRY }}/kubric/vdr:${{ env.IMAGE_TAG }} \
            kubric/kic=${{ env.REGISTRY }}/kubric/kic:${{ env.IMAGE_TAG }} \
            kubric/noc=${{ env.REGISTRY }}/kubric/noc:${{ env.IMAGE_TAG }} \
            kubric/kai=${{ env.REGISTRY }}/kubric/kai:${{ env.IMAGE_TAG }} \
            kubric/web=${{ env.REGISTRY }}/kubric/web:${{ env.IMAGE_TAG }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollouts
        run: |
          kubectl -n kubric rollout status deployment/k-svc --timeout=5m
          kubectl -n kubric rollout status deployment/vdr --timeout=3m
          kubectl -n kubric rollout status deployment/kic --timeout=3m
          kubectl -n kubric rollout status deployment/noc --timeout=3m
          kubectl -n kubric rollout status deployment/kai-core --timeout=5m
          kubectl -n kubric rollout status deployment/web --timeout=3m

      - name: Smoke tests
        run: |
          # Wait for services to stabilize
          sleep 10
          # Health check all services
          for svc in k-svc vdr kic noc; do
            kubectl -n kubric exec deploy/$svc -- wget -qO- http://localhost:8080/healthz 2>/dev/null || \
              echo "Warning: $svc health check inconclusive (expected in staging)"
          done

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Require approval
        run: |
          echo "Production deployment requires manual approval via environment protection rules"

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy via kustomize (prod overlay)
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image \
            kubric/k-svc=${{ env.REGISTRY }}/kubric/k-svc:${{ env.IMAGE_TAG }} \
            kubric/vdr=${{ env.REGISTRY }}/kubric/vdr:${{ env.IMAGE_TAG }} \
            kubric/kic=${{ env.REGISTRY }}/kubric/kic:${{ env.IMAGE_TAG }} \
            kubric/noc=${{ env.REGISTRY }}/kubric/noc:${{ env.IMAGE_TAG }} \
            kubric/kai=${{ env.REGISTRY }}/kubric/kai:${{ env.IMAGE_TAG }} \
            kubric/web=${{ env.REGISTRY }}/kubric/web:${{ env.IMAGE_TAG }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollouts
        run: |
          kubectl -n kubric rollout status deployment/k-svc --timeout=5m
          kubectl -n kubric rollout status deployment/vdr --timeout=5m
          kubectl -n kubric rollout status deployment/kic --timeout=5m
          kubectl -n kubric rollout status deployment/noc --timeout=5m
          kubectl -n kubric rollout status deployment/kai-core --timeout=5m
          kubectl -n kubric rollout status deployment/web --timeout=5m

      - name: Health check
        run: |
          for i in {1..10}; do
            if kubectl -n kubric exec deploy/k-svc -- wget -qO- http://localhost:8080/healthz 2>/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/10..."
            sleep 10
          done
          echo "Health check failed — rolling back"
          kubectl -n kubric rollout undo deployment/k-svc
          kubectl -n kubric rollout undo deployment/vdr
          kubectl -n kubric rollout undo deployment/kic
          kubectl -n kubric rollout undo deployment/noc
          kubectl -n kubric rollout undo deployment/kai-core
          kubectl -n kubric rollout undo deployment/web
          exit 1

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment successful for commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl -n kubric rollout undo deployment/k-svc
          kubectl -n kubric rollout undo deployment/vdr
          kubectl -n kubric rollout undo deployment/kic
          kubectl -n kubric rollout undo deployment/noc
          kubectl -n kubric rollout undo deployment/kai-core
          kubectl -n kubric rollout undo deployment/web
