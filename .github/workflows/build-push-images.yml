name: Build and Push Kubric Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: coresec
            dockerfile: Dockerfile.agents
            target: coresec
          - image: netguard
            dockerfile: Dockerfile.agents
            target: netguard
          - image: ndr-rita
            dockerfile: Dockerfile.api
            target: ndr-rita
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR with Kubric PAT
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_KUBRIC_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kubric-uidr/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/kubric-uidr/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
