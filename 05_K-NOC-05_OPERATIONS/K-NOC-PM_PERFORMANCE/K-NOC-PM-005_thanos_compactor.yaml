---
# ConfigMap: MinIO/S3 object store config for Thanos.
# Credentials are injected at container runtime via env vars sourced from the
# thanos-s3-credentials Secret below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-objstore-config
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability
data:
  objstore.yaml: |
    type: S3
    config:
      bucket: kubric-metrics
      endpoint: minio:9000
      access_key: "$(THANOS_S3_ACCESS_KEY)"
      secret_key: "$(THANOS_S3_SECRET_KEY)"
      insecure: true
      signature_version2: false

---
apiVersion: v1
kind: Secret
metadata:
  name: thanos-s3-credentials
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability
type: Opaque
# Base64-encoded placeholder values; replace with real secrets via Sealed Secret
# or an external secrets operator before deploying.
stringData:
  THANOS_S3_ACCESS_KEY: "REPLACE_ME"
  THANOS_S3_SECRET_KEY: "REPLACE_ME"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-thanos-compact
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thanos-compactor
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability

---
# Compactor MUST run as a single replica; concurrent compactors corrupt blocks.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-compactor
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/component: compactor
    app.kubernetes.io/part-of: kubric-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thanos-compactor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: thanos-compactor
        app.kubernetes.io/component: compactor
        app.kubernetes.io/part-of: kubric-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10902"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: thanos-compactor
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      volumes:
        - name: objstore-config
          configMap:
            name: thanos-objstore-config
        - name: data
          persistentVolumeClaim:
            claimName: data-thanos-compact
      containers:
        - name: thanos-compactor
          image: quay.io/thanos/thanos:v0.37.0
          imagePullPolicy: IfNotPresent
          env:
            - name: THANOS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: thanos-s3-credentials
                  key: THANOS_S3_ACCESS_KEY
            - name: THANOS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: thanos-s3-credentials
                  key: THANOS_S3_SECRET_KEY
          args:
            - compact
            - --wait
            - --objstore.config-file=/etc/thanos/objstore.yaml
            - --http-address=0.0.0.0:10902
            - --data-dir=/data
            - --retention.resolution-raw=90d
            - --retention.resolution-5m=180d
            - --retention.resolution-1h=365d
            - --delete-delay=48h
            - --compact.concurrency=2
            - --log.level=info
            - --log.format=json
            - --consistency-delay=30m
            - --wait-interval=5m
          ports:
            - name: http
              containerPort: 10902
              protocol: TCP
          volumeMounts:
            - name: objstore-config
              mountPath: /etc/thanos
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 10902
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 10902
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: thanos-compactor
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability
spec:
  selector:
    app: thanos-compactor
  ports:
    - name: http
      port: 10902
      targetPort: 10902
      protocol: TCP
  type: ClusterIP

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: thanos-compactor
  namespace: monitoring
  labels:
    app: thanos-compactor
    app.kubernetes.io/part-of: kubric-observability
spec:
  selector:
    matchLabels:
      app: thanos-compactor
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
