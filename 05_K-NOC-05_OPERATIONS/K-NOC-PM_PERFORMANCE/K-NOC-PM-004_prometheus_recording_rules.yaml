# K-NOC-PM-004 -- Kubric Prometheus Recording Rules
# Pre-computed aggregations for dashboards, alerts, and Thanos long-term storage.
# Deploy: kubectl apply -f K-NOC-PM-004_prometheus_recording_rules.yaml -n monitoring

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubric-recording-rules
  namespace: monitoring
  labels:
    app: kubric
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # ------------------------------------------------------------------ #
    # NOC: Incident rate and agent health                                 #
    # ------------------------------------------------------------------ #
    - name: kubric.noc
      interval: 30s
      rules:
        - record: kubric:noc:incident_rate5m
          expr: |
            sum by (tenant_id) (
              rate(kubric_incidents_created_total[5m])
            )
          labels:
            group: noc
          annotations:
            description: "Rate of incidents created per tenant over 5 minutes."

        - record: kubric:noc:incident_rate1h
          expr: |
            sum by (tenant_id) (
              rate(kubric_incidents_created_total[1h])
            )
          labels:
            group: noc

        - record: kubric:noc:agent_availability
          expr: |
            (
              count by (tenant_id) (
                (time() - kubric_agent_last_heartbeat_timestamp_seconds) < 300
              )
              /
              count by (tenant_id) (kubric_agent_last_heartbeat_timestamp_seconds)
            ) * 100
          labels:
            group: noc
          annotations:
            description: "Percentage of agents that sent a heartbeat in the last 5 minutes."

        - record: kubric:noc:agent_stale_count
          expr: |
            count by (tenant_id) (
              (time() - kubric_agent_last_heartbeat_timestamp_seconds) >= 300
            )
          labels:
            group: noc

        - record: kubric:noc:open_incident_count
          expr: |
            sum by (tenant_id, severity) (
              kubric_incidents_status_gauge{status="open"}
            )
          labels:
            group: noc

    # ------------------------------------------------------------------ #
    # VDR: Vulnerability counts                                           #
    # ------------------------------------------------------------------ #
    - name: kubric.vdr
      interval: 60s
      rules:
        - record: kubric:vdr:critical_vuln_count
          expr: |
            sum by (tenant_id) (
              kubric_findings_total{severity="critical", status="open"}
            )
          labels:
            group: vdr
          annotations:
            description: "Count of unpatched critical CVEs per tenant."

        - record: kubric:vdr:high_vuln_count
          expr: |
            sum by (tenant_id) (
              kubric_findings_total{severity="high", status="open"}
            )
          labels:
            group: vdr

        - record: kubric:vdr:remediation_rate1d
          expr: |
            sum by (tenant_id) (
              increase(kubric_findings_remediated_total[1d])
            )
          labels:
            group: vdr

    # ------------------------------------------------------------------ #
    # K-SVC: Tenant and licensing                                         #
    # ------------------------------------------------------------------ #
    - name: kubric.ksvc
      interval: 60s
      rules:
        - record: kubric:k_svc:active_tenants
          expr: |
            count(
              count by (tenant_id) (kubric_tenant_last_activity_timestamp_seconds)
            )
          labels:
            group: ksvc
          annotations:
            description: "Number of tenants with activity in the last scrape window."

        - record: kubric:k_svc:tenant_license_utilization
          expr: |
            kubric_tenant_seats_used / kubric_tenant_seats_licensed * 100
          labels:
            group: ksvc

    # ------------------------------------------------------------------ #
    # Correlation / NATS: Event throughput                                #
    # ------------------------------------------------------------------ #
    - name: kubric.correlation
      interval: 15s
      rules:
        - record: kubric:correlation:events_per_second
          expr: |
            sum(rate(nats_consumer_num_delivered_msgs[1m]))
          labels:
            group: correlation
          annotations:
            description: "Total NATS event delivery rate across all Kubric streams."

        - record: kubric:correlation:consumer_lag
          expr: |
            sum by (stream_name) (
              nats_consumer_num_pending
            )
          labels:
            group: correlation

        - record: kubric:correlation:rule_hit_rate5m
          expr: |
            sum by (rule_id, tenant_id) (
              rate(kubric_correlation_rule_hits_total[5m])
            )
          labels:
            group: correlation

    # ------------------------------------------------------------------ #
    # Billing: HLE consumption                                            #
    # ------------------------------------------------------------------ #
    - name: kubric.billing
      interval: 300s
      rules:
        - record: kubric:billing:monthly_hle
          expr: |
            sum by (tenant_id) (
              increase(kubric_hle_consumed_total[30d])
            )
          labels:
            group: billing
          annotations:
            description: "Monthly HLE (Human Labour Equivalent) units consumed per tenant."

        - record: kubric:billing:daily_hle
          expr: |
            sum by (tenant_id) (
              increase(kubric_hle_consumed_total[1d])
            )
          labels:
            group: billing

    # ------------------------------------------------------------------ #
    # Infrastructure: ClickHouse and Postgres health                     #
    # ------------------------------------------------------------------ #
    - name: kubric.infra
      interval: 30s
      rules:
        - record: kubric:infra:clickhouse_insert_rate
          expr: |
            rate(ClickHouseProfileEvents_InsertedRows[1m])
          labels:
            group: infra

        - record: kubric:infra:clickhouse_query_p99_ms
          expr: |
            histogram_quantile(0.99,
              rate(ClickHouseMetrics_SlowReadQueries_bucket[5m])
            ) * 1000
          labels:
            group: infra

        - record: kubric:infra:postgres_query_p99_ms
          expr: |
            histogram_quantile(0.99,
              rate(pg_stat_activity_seconds_bucket[5m])
            ) * 1000
          labels:
            group: infra
