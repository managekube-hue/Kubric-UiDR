---
# Kubernetes ConfigMap: Grafana provisioned datasources.
# Mount this ConfigMap into Grafana at:
#   /etc/grafana/provisioning/datasources/
# Grafana reads all .yaml files in that directory on startup (and on live reload).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: kubric-observability
data:
  datasources.yaml: |
    apiVersion: 1
    prune: true

    datasources:

      # ------------------------------------------------------------------ #
      # 1. Prometheus — primary metrics store (default)                     #
      # ------------------------------------------------------------------ #
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"
          queryTimeout: "60s"
          httpMethod: POST
          prometheusType: Prometheus
          prometheusVersion: "2.48.0"
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo
        version: 1
        editable: false

      # ------------------------------------------------------------------ #
      # 2. Loki — log aggregation                                           #
      # ------------------------------------------------------------------ #
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          maxLines: 5000
          derivedFields:
            - name: TraceID
              matcherRegex: "traceID=(\\w+)"
              url: "${__value.raw}"
              datasourceUid: tempo
        version: 1
        editable: false

      # ------------------------------------------------------------------ #
      # 3. Tempo — distributed tracing with trace-to-logs and service map   #
      # ------------------------------------------------------------------ #
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        access: proxy
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: loki
            tags:
              - fromField: service.name
                toLabel: app
              - fromField: k8s.namespace.name
                toLabel: namespace
            mappedTags:
              - fromField: service.name
                toLabel: service
            mapTagNamesEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: false
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          search:
            hide: false
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
          spanBar:
            tag: http.path
        version: 1
        editable: false

      # ------------------------------------------------------------------ #
      # 4. ClickHouse — raw events and correlation logs                     #
      # ------------------------------------------------------------------ #
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: clickhouse
        url: http://clickhouse:8123
        access: proxy
        jsonData:
          server: clickhouse
          port: 8123
          protocol: http
          database: kubric
          username: default
          defaultDatabase: kubric
          dialTimeout: "10"
          queryTimeout: "60"
          validateSql: false
        version: 1
        editable: false

      # ------------------------------------------------------------------ #
      # 5. PostgreSQL — application database (tenants, findings, etc.)      #
      # ------------------------------------------------------------------ #
      - name: PostgreSQL
        type: postgres
        uid: postgres
        url: postgres:5432
        access: proxy
        database: kubric
        user: kubric
        jsonData:
          sslmode: disable
          maxOpenConns: 10
          maxIdleConns: 2
          connMaxLifetime: 14400
          postgresVersion: 1500
          timescaledb: false
        version: 1
        editable: false

      # ------------------------------------------------------------------ #
      # 6. Infinity — JSON/CSV/REST API sources                             #
      # ------------------------------------------------------------------ #
      - name: Infinity
        type: yesoreyeram-infinity-datasource
        uid: infinity
        access: proxy
        jsonData:
          global_queries: []
        version: 1
        editable: false
