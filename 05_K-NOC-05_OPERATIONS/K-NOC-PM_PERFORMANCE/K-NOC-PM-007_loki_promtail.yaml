---
# ConfigMap: Loki single-process configuration.
# Runs chunk store, ring, compactor and ruler in a single binary.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
    app.kubernetes.io/part-of: kubric-observability
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: warn
      log_format: json

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v12
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        shared_store: filesystem
        cache_location: /loki/index_cache
        cache_ttl: 24h
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      compaction_interval: 10m

    limits_config:
      retention_period: 720h
      ingestion_rate_mb: 32
      ingestion_burst_size_mb: 64
      max_streams_per_user: 10000
      max_global_streams_per_user: 10000
      max_chunks_per_query: 2000000
      max_query_length: 721h
      max_query_parallelism: 32
      max_cache_freshness_per_query: 10m

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      enable_api: false
      enable_alertmanager_v2: false

    analytics:
      reporting_enabled: false

---
# ServiceAccount used by Promtail for Kubernetes pod discovery.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
    app.kubernetes.io/part-of: kubric-observability

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
    app.kubernetes.io/part-of: kubric-observability
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
    app.kubernetes.io/part-of: kubric-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring

---
# ConfigMap: Promtail scrape + pipeline configuration.
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
    app.kubernetes.io/part-of: kubric-observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn
      log_format: json

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push
        batchwait: 1s
        batchsize: 1048576
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_promtail_io_skip]
            action: drop
            regex: "true"

          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1*/$2/*.log

          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
            action: replace
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: (.+)
            target_label: app
            action: replace

          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
            action: replace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
            action: replace

          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
            action: replace

          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
            action: replace

        pipeline_stages:
          - docker: {}
          - labels:
              app:
              namespace:
              pod:
              container:

---
# DaemonSet: Promtail — one pod per node, ships logs to Loki.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
    app.kubernetes.io/part-of: kubric-observability
spec:
  selector:
    matchLabels:
      app: promtail
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: promtail
        app.kubernetes.io/part-of: kubric-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: promtail
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsGroup: 0
        runAsUser: 0
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}
      containers:
        - name: promtail
          image: grafana/promtail:3.4.0
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yaml
            - -config.expand-env=true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http-metrics
              containerPort: 9080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /run/promtail
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 30
