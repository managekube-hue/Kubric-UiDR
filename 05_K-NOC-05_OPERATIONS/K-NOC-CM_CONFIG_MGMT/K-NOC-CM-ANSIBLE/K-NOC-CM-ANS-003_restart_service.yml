---
# K-NOC-CM-ANS-003 -- Graceful Service Restart
# Validates the target service exists, drains it via SIGTERM (systemctl stop),
# waits a configurable drain window, starts the unit, polls for active status
# up to 60 seconds, and reports the full lifecycle to the Kubric NOC API.
#
# Required vars:
#   service_name      - systemd unit name (e.g. noc, nginx, postgresql)
#   target_host       - FQDN, IP, or inventory alias of the target host
#   ticket_id         - Incident / change ticket reference (e.g. INC-20240312-001)
#
# Optional vars:
#   drain_wait_seconds - Seconds to pause after SIGTERM before starting (default 30)
#   kubric_noc_url     - Kubric NOC API base URL (default noc.kubric.io)
#
# Tags: operations, service-restart
#
# Usage:
#   ansible-playbook K-NOC-CM-ANS-003_restart_service.yml \
#     -e "target_host=prod-web-01 service_name=nginx ticket_id=INC-20240601-007"

- name: "Kubric NOC — Graceful Service Restart"
  hosts: "{{ target_host }}"
  gather_facts: true
  become: true

  vars:
    drain_wait_seconds: 30
    kubric_noc_url: "{{ lookup('env', 'KUBRIC_NOC_URL') | default('noc.kubric.io', true) }}"
    kubric_api_token: "{{ lookup('env', 'KUBRIC_API_TOKEN') | default('', true) }}"
    # Internal: protocol prefix resolved once so all uri tasks stay DRY
    _noc_api_base: >-
      {{ 'http://' + kubric_noc_url
         if kubric_noc_url is not match('^https?://')
         else kubric_noc_url }}

  pre_tasks:
    # ------------------------------------------------------------------ #
    # Validate all required variables before touching the target host     #
    # ------------------------------------------------------------------ #
    - name: "Validate required vars — service_name"
      ansible.builtin.assert:
        that:
          - service_name is defined
          - service_name | length > 0
        fail_msg: >-
          REQUIRED: service_name must be a non-empty systemd unit name.
          Pass via -e "service_name=<unit>".

    - name: "Validate required vars — target_host"
      ansible.builtin.assert:
        that:
          - target_host is defined
          - target_host | length > 0
        fail_msg: >-
          REQUIRED: target_host must be a non-empty FQDN, IP, or inventory alias.

    - name: "Validate required vars — ticket_id"
      ansible.builtin.assert:
        that:
          - ticket_id is defined
          - ticket_id | length > 0
        fail_msg: >-
          REQUIRED: ticket_id must be a non-empty incident / change reference.
          Pass via -e "ticket_id=INC-YYYYMMDD-NNN".

  tasks:
    # ------------------------------------------------------------------ #
    # 1. Capture pre-restart service state                                #
    # ------------------------------------------------------------------ #
    - name: "Get current service status (prior_status)"
      ansible.builtin.command:
        cmd: "systemctl status {{ service_name }}"
      register: prior_status
      ignore_errors: true
      changed_when: false
      tags: [operations, service-restart]

    - name: "Determine whether service is currently active"
      ansible.builtin.command:
        cmd: "systemctl is-active {{ service_name }}"
      register: _is_active_pre
      ignore_errors: true
      changed_when: false
      tags: [operations, service-restart]

    - name: "Log pre-restart state"
      ansible.builtin.debug:
        msg: >-
          [PRE-RESTART] service={{ service_name }}
          host={{ ansible_hostname }}
          ticket={{ ticket_id }}
          active={{ _is_active_pre.stdout | trim }}
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 2. Graceful drain via SIGTERM (systemctl stop with KillMode=mixed)  #
    # ------------------------------------------------------------------ #
    - name: "Drain service — send SIGTERM via systemctl stop (active units only)"
      ansible.builtin.command:
        cmd: "systemctl stop {{ service_name }}"
      when: (_is_active_pre.stdout | trim) == 'active'
      register: _stop_result
      changed_when: _stop_result.rc == 0
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 3. Wait the configured drain window before starting the unit        #
    # ------------------------------------------------------------------ #
    - name: "Pause {{ drain_wait_seconds }}s to allow in-flight work to complete"
      ansible.builtin.pause:
        seconds: "{{ drain_wait_seconds | int }}"
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 4. Start the service                                                #
    # ------------------------------------------------------------------ #
    - name: "Start {{ service_name }} via systemctl"
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: started
        daemon_reload: false
      register: _start_result
      notify: "reload systemd"
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 5. Poll is-active up to 60 seconds (6 × 10 s retries)              #
    # ------------------------------------------------------------------ #
    - name: "Poll systemctl is-active — wait up to 60s for {{ service_name }}"
      ansible.builtin.command:
        cmd: "systemctl is-active {{ service_name }}"
      register: _active_poll
      until: (_active_poll.stdout | trim) == 'active'
      retries: 6
      delay: 10
      ignore_errors: true
      changed_when: false
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 6. Hard-fail the play if the service never reached active state     #
    # ------------------------------------------------------------------ #
    - name: "Verify service is active — fail if not active after 60s"
      ansible.builtin.fail:
        msg: >-
          RESTART FAILED: {{ service_name }} on {{ ansible_hostname }}
          is '{{ _active_poll.stdout | trim }}' after 60 s.
          ticket={{ ticket_id }}
          Check journalctl -u {{ service_name }} -n 100 --no-pager
      when: (_active_poll.stdout | trim) != 'active'
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 7. Capture post-restart service state                               #
    # ------------------------------------------------------------------ #
    - name: "Get post-restart service status (post_status)"
      ansible.builtin.command:
        cmd: "systemctl status {{ service_name }}"
      register: post_status
      ignore_errors: true
      changed_when: false
      tags: [operations, service-restart]

    - name: "Log post-restart state"
      ansible.builtin.debug:
        msg: >-
          [POST-RESTART] service={{ service_name }}
          host={{ ansible_hostname }}
          state=active
          ticket={{ ticket_id }}
      tags: [operations, service-restart]

    # ------------------------------------------------------------------ #
    # 8. POST completion report to Kubric NOC API                        #
    # ------------------------------------------------------------------ #
    - name: "POST restart completion to Kubric NOC API /api/v1/remediation/events"
      ansible.builtin.uri:
        url: "{{ _noc_api_base }}/api/v1/remediation/events"
        method: POST
        headers:
          Authorization: "Bearer {{ kubric_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          ticket_id: "{{ ticket_id }}"
          service_name: "{{ service_name }}"
          action: "restart"
          prior_status: "{{ prior_status.stdout | default('') | truncate(1024, True, '...') }}"
          post_status: "{{ post_status.stdout | default('') | truncate(1024, True, '...') }}"
          hostname: "{{ ansible_hostname }}"
          prior_active: "{{ _is_active_pre.stdout | trim | default('unknown') }}"
          post_active: "{{ _active_poll.stdout | trim | default('unknown') }}"
          drain_wait_seconds: "{{ drain_wait_seconds | int }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          source: "ansible/K-NOC-CM-ANS-003"
        status_code: [200, 201, 202, 204]
        timeout: 15
      delegate_to: localhost
      ignore_errors: true
      tags: [operations, service-restart]

  handlers:
    # Triggered by the systemd start task via notify
    - name: "reload systemd"
      ansible.builtin.systemd:
        daemon_reload: true
