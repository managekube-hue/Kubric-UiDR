###############################################################################
# K-K8S-GO-003  Helm values.yaml for Kubric platform chart
###############################################################################
global:
  domain: kubric.io
  registry: ghcr.io/managekube-hue
  imagePullPolicy: IfNotPresent
  labels:
    app.kubernetes.io/part-of: kubric

ksvc:
  replicas: 2
  port: 8080
  image:
    repository: ghcr.io/managekube-hue/kubric-ksvc
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    DATABASE_URL:
      secretKeyRef:
        name: kubric-secrets
        key: DATABASE_URL
    NATS_URL:
      secretKeyRef:
        name: kubric-secrets
        key: NATS_URL
    JWT_SECRET:
      secretKeyRef:
        name: kubric-secrets
        key: JWT_SECRET

noc:
  replicas: 2
  port: 8083
  image:
    repository: ghcr.io/managekube-hue/kubric-noc
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

vdr:
  replicas: 1
  port: 8081
  image:
    repository: ghcr.io/managekube-hue/kubric-vdr
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

kic:
  replicas: 1
  port: 8082
  image:
    repository: ghcr.io/managekube-hue/kubric-kic
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

kai:
  replicas: 2
  port: 8100
  image:
    repository: ghcr.io/managekube-hue/kubric-kai
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

postgres:
  storage: 20Gi
  image:
    repository: postgres
    tag: 16-alpine
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

clickhouse:
  storage: 50Gi
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.3"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

nats:
  replicas: 3
  storage: 100Gi
  image:
    repository: nats
    tag: 2.10-alpine
  jetstream:
    maxMem: 1GB
    maxFile: 100GB
    storeDir: /data/jetstream
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
  hosts:
    - host: api.kubric.io
      paths:
        - path: /
          service: ksvc
          port: 8080
  tls:
    - secretName: kubric-tls
      hosts:
        - "*.kubric.io"

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
