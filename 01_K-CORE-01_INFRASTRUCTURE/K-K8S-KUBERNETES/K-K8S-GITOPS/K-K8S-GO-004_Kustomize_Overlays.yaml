###############################################################################
# K-K8S-GO-004  Kustomize Overlays — base kustomization.yaml
###############################################################################
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubric

commonLabels:
  app.kubernetes.io/part-of: kubric

resources:
  - api-deployment.yaml
  - noc-deployment.yaml
  - vdr-deployment.yaml
  - kic-deployment.yaml
  - kai-deployment.yaml
  - kai-python-deployment.yaml

configMapGenerator:
  - name: kubric-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - NATS_URL=nats://nats.kubric.svc.cluster.local:4222

images:
  - name: ghcr.io/managekube-hue/kubric-ksvc
    newTag: latest
  - name: ghcr.io/managekube-hue/kubric-noc
    newTag: latest
  - name: ghcr.io/managekube-hue/kubric-vdr
    newTag: latest
  - name: ghcr.io/managekube-hue/kubric-kic
    newTag: latest
  - name: ghcr.io/managekube-hue/kubric-kai
    newTag: latest
