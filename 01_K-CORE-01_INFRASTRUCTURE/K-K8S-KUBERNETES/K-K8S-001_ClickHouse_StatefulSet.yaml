###############################################################################
# K-K8S-001  ClickHouse StatefulSet + Headless Service
# Namespace : kubric
# Image     : clickhouse/clickhouse-server:24.3
###############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: kubric
  labels:
    app.kubernetes.io/part-of: kubric
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: kubric
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: kubric
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
    - name: native
      port: 9000
      targetPort: 9000
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: kubric
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: kubric
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: kubric
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          env:
            - name: CLICKHOUSE_DB
              value: kubric
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
