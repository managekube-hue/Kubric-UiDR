###############################################################################
# K-K8S-004  Kubric API (ksvc) Deployment + ClusterIP Service
# Namespace : kubric
# Image     : ghcr.io/managekube-hue/kubric-ksvc:latest
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ksvc
  namespace: kubric
  labels:
    app.kubernetes.io/name: ksvc
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ksvc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ksvc
        app.kubernetes.io/part-of: kubric
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ksvc
          image: ghcr.io/managekube-hue/kubric-ksvc:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: DATABASE_URL
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: NATS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubric-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ksvc
  namespace: kubric
  labels:
    app.kubernetes.io/name: ksvc
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ksvc
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
