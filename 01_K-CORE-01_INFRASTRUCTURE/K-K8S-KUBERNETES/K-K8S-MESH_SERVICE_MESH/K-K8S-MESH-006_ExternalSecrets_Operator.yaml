###############################################################################
# K-K8S-MESH-006  ExternalSecrets SecretStore + ExternalSecret
# Provider  : HashiCorp Vault
# Vault     : https://vault.kubric.svc:8200
###############################################################################
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: kubric
  labels:
    app.kubernetes.io/name: vault-backend
    app.kubernetes.io/part-of: kubric
spec:
  provider:
    vault:
      server: https://vault.kubric.svc:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: kubric-external-secrets
          serviceAccountRef:
            name: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kubric-secrets
  namespace: kubric
  labels:
    app.kubernetes.io/name: kubric-secrets
    app.kubernetes.io/part-of: kubric
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: kubric-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/data/kubric/production
        property: DATABASE_URL
    - secretKey: NATS_URL
      remoteRef:
        key: secret/data/kubric/production
        property: NATS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/data/kubric/production
        property: JWT_SECRET
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: secret/data/kubric/production
        property: STRIPE_SECRET_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/kubric/production
        property: OPENAI_API_KEY
