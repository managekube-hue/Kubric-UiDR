###############################################################################
# K-K8S-OBS-002  Thanos Sidecar container spec + objstore ConfigMap
# Image     : quay.io/thanos/thanos:v0.37.0
# Object    : MinIO S3-compatible backend
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-objstore
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/part-of: kubric
data:
  objstore.yaml: |
    type: S3
    config:
      bucket: thanos
      endpoint: minio.kubric.svc.cluster.local:9000
      access_key: ${MINIO_ACCESS_KEY}
      secret_key: ${MINIO_SECRET_KEY}
      insecure: true
      signature_version2: false
---
# Patch this into the Prometheus StatefulSet as an additional container.
# Use: kubectl patch statefulset prometheus-kubric -n monitoring --type=json \
#      -p "$(cat thanos-sidecar-patch.json)"
# Or include it in the Prometheus CRD spec.containers[] field.
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-sidecar-spec
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-sidecar
    app.kubernetes.io/part-of: kubric
data:
  sidecar-container.yaml: |
    name: thanos-sidecar
    image: quay.io/thanos/thanos:v0.37.0
    args:
      - sidecar
      - --tsdb.path=/prometheus
      - --objstore.config-file=/etc/thanos/objstore.yaml
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
    ports:
      - name: grpc
        containerPort: 10901
        protocol: TCP
      - name: http
        containerPort: 10902
        protocol: TCP
    readinessProbe:
      httpGet:
        path: /-/ready
        port: 10902
      initialDelaySeconds: 10
      periodSeconds: 15
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 10902
      initialDelaySeconds: 15
      periodSeconds: 20
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    volumeMounts:
      - name: prometheus-kubric-db
        mountPath: /prometheus
        readOnly: false
      - name: thanos-objstore
        mountPath: /etc/thanos
        readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-sidecar
  namespace: monitoring
  labels:
    app.kubernetes.io/name: thanos-sidecar
    app.kubernetes.io/part-of: kubric
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
    prometheus: kubric
  ports:
    - name: grpc
      port: 10901
      targetPort: 10901
      protocol: TCP
    - name: http
      port: 10902
      targetPort: 10902
      protocol: TCP
