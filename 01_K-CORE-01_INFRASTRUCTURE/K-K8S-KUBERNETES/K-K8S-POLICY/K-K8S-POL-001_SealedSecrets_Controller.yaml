###############################################################################
# K-K8S-POL-001  Sealed Secrets Controller (HelmRelease via Flux)
# Chart     : sealed-secrets v2.16.0
# Namespace : kube-system
###############################################################################
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sealed-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/part-of: kubric
spec:
  interval: 1h
  url: https://bitnami-labs.github.io/sealed-secrets
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/part-of: kubric
spec:
  interval: 15m
  chart:
    spec:
      chart: sealed-secrets
      version: 2.16.0
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
  releaseName: sealed-secrets
  targetNamespace: kube-system
  values:
    fullnameOverride: sealed-secrets-controller
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
---
# Example SealedSecret to demonstrate the CRD usage
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kubric-secrets-sealed
  namespace: kubric
  labels:
    app.kubernetes.io/name: kubric-secrets
    app.kubernetes.io/part-of: kubric
spec:
  encryptedData:
    # Replace these with actual kubeseal-encrypted values:
    DATABASE_URL: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    NATS_URL: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    JWT_SECRET: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
  template:
    metadata:
      name: kubric-secrets
      namespace: kubric
      labels:
        app.kubernetes.io/name: kubric-secrets
        app.kubernetes.io/part-of: kubric
    type: Opaque
