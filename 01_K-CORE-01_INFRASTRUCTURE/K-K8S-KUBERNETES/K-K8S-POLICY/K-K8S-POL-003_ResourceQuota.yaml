###############################################################################
# K-K8S-POL-003  ResourceQuota + LimitRange for namespace kubric
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kubric-quota
  namespace: kubric
  labels:
    app.kubernetes.io/name: kubric-quota
    app.kubernetes.io/part-of: kubric
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "100"
    services: "30"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: kubric-limits
  namespace: kubric
  labels:
    app.kubernetes.io/name: kubric-limits
    app.kubernetes.io/part-of: kubric
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi
