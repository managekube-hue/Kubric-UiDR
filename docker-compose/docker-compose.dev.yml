services:

  # ── Tier 0: Core infra ─────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kubric
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../config/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    command: -c /etc/nats/nats-server.conf
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ../config/nats/nats-server.conf:/etc/nats/nats-server.conf
      - nats_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - LOG_LEVEL=information
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ../config/clickhouse:/etc/clickhouse-server
      - clickhouse_data:/var/lib/clickhouse
    depends_on:
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j — threat actor graph (L3-1 BloodHound cypher queries) ─────────────
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/dev_password
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "dev_password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── HashiCorp Vault — secret management (L0-5, L3) ──────────────────────────
  vault:
    image: hashicorp/vault:1.18
    command: ["server", "-dev", "-dev-root-token-id=dev-root-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
      - ../config/vault:/vault/config
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama — local LLM inference server (KAI-TRIAGE, SENTINEL, KEEPER) ──────
  # Exposes OpenAI-compatible /api/generate endpoint.
  # On GPU hosts, add: runtime: nvidia + NVIDIA_VISIBLE_DEVICES: all
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── n8n — workflow automation (alert routing, ITSM integration) ─────────────
  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: dev_password
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: dev_password
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../config/n8n/workflows:/home/node/.n8n/workflows
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MinIO — S3-compatible object storage (Temporal archival, SBOM storage) ──
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: dev_password
    ports:
      - "9999:9000"   # S3 API (remapped to avoid conflict with ClickHouse)
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki — log aggregation backend ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki.yaml
    ports:
      - "3100:3100"
    volumes:
      - ../config/loki/loki.yaml:/etc/loki/loki.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana — dashboards (metrics, logs, traces) ────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dev_password
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource,victoriametrics-datasource"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (existing — kept, metrics scraping) ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ── Caddy — TLS reverse proxy ─────────────────────────────────────────────
  caddy:
    image: caddy:latest
    volumes:
      - ../config/caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - postgres
      - nats
      - clickhouse

  # ── Layer 2: Temporal server ─────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=dev_password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
    volumes:
      - ../config/temporal:/etc/temporal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.28.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  # ── Layer 2: KAI Python AI layer ─────────────────────────────────────────
  kai:
    build:
      context: ../
      dockerfile: docker/kai.Dockerfile
    environment:
      KUBRIC_TENANT_ID: ${KUBRIC_TENANT_ID:-dev-tenant}
      KUBRIC_NATS_URL: nats://nats:4222
      KUBRIC_DATABASE_URL: postgresql://postgres:dev_password@postgres:5432/kubric
      KUBRIC_CLICKHOUSE_URL: clickhouse://default:@clickhouse:9000/kubric
      KUBRIC_CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      KUBRIC_TEMPORAL_URL: temporal:7233
      KUBRIC_OLLAMA_URL: http://ollama:11434
      KUBRIC_AUTO_REMEDIATE: ${KUBRIC_AUTO_REMEDIATE:-false}
      KUBRIC_KNOWN_TENANTS: ${KUBRIC_KNOWN_TENANTS:-dev-tenant}
      KUBRIC_NEO4J_URI: bolt://neo4j:7687
      KUBRIC_NEO4J_USER: neo4j
      KUBRIC_NEO4J_PASSWORD: dev_password
      KUBRIC_VAULT_ADDR: http://vault:8200
      KUBRIC_VAULT_TOKEN: dev-root-token
    ports:
      - "8100:8100"
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Layer 2: KAI Temporal worker ─────────────────────────────────────────
  kai-worker:
    build:
      context: ../
      dockerfile: docker/kai.Dockerfile
    command: ["kai-worker"]
    environment:
      KUBRIC_TENANT_ID: ${KUBRIC_TENANT_ID:-dev-tenant}
      KUBRIC_NATS_URL: nats://nats:4222
      KUBRIC_DATABASE_URL: postgresql://postgres:dev_password@postgres:5432/kubric
      KUBRIC_CLICKHOUSE_URL: clickhouse://default:@clickhouse:9000/kubric
      KUBRIC_CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      KUBRIC_TEMPORAL_URL: temporal:7233
      KUBRIC_STRIPE_SECRET_KEY: ${KUBRIC_STRIPE_SECRET_KEY:-}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
  clickhouse_data:
  prometheus_data:
  neo4j_data:
  neo4j_logs:
  vault_data:
  ollama_models:
  n8n_data:
  minio_data:
  loki_data:
  grafana_data:

networks:
  default:
    name: kubric
