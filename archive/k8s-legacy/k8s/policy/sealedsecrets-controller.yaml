# K-K8S-POL-001 — SealedSecrets Controller
# Encrypts K8s secrets with cluster public key — SAFE to store in git.
# Decrypted only inside the cluster by the sealed-secrets controller.
#
# Prerequisites:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm install sealed-secrets bitnami/sealed-secrets -n kube-system
#   brew install kubeseal   # macOS; or https://github.com/bitnami-labs/sealed-secrets/releases
#
# How to seal a secret:
#   1. Fetch cluster cert:
#        kubeseal --fetch-cert --controller-name=sealed-secrets \
#                 --controller-namespace=kube-system > kubric-cert.pem
#   2. Create plain k8s Secret then seal it:
#        kubectl create secret generic my-secret \
#          --from-literal=password='s3cr3t' -n kubric --dry-run=client -o yaml \
#          | kubeseal --cert kubric-cert.pem --format yaml > my-sealed-secret.yaml
#   3. Apply the SealedSecret (NOT the plain Secret) to git and your cluster.
#
# The files below are TEMPLATES — replace every <KUBESEAL_CIPHERTEXT_HERE>
# with real kubeseal output before applying.  Never commit plain Secret YAML.

---
# SealedSecret for ClickHouse credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: clickhouse-credentials
  namespace: kubric
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    username: <KUBESEAL_CIPHERTEXT_HERE>
    password: <KUBESEAL_CIPHERTEXT_HERE>
  template:
    metadata:
      name: clickhouse-credentials
      namespace: kubric
    type: Opaque
---
