  namespace: kubric
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    nkey-seed: <KUBESEAL_CIPHERTEXT_HERE>
    jwt-token: <KUBESEAL_CIPHERTEXT_HERE>
  template:
    metadata:
      name: nats-credentials
      namespace: kubric
    type: Opaque
---
# SealedSecret for Stripe API key
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: stripe-api-key
  namespace: kubric
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    secret-key: <KUBESEAL_CIPHERTEXT_HERE>
    webhook-secret: <KUBESEAL_CIPHERTEXT_HERE>
  template:
    metadata:
      name: stripe-api-key
      namespace: kubric
    type: Opaque
