apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay — HA replicas, latest image tags
resources:
  - ../../base

namespace: kubric

patches:
  # k-svc: 3 replicas (customer-facing gateway)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: k-svc
        namespace: kubric
      spec:
        replicas: 3
  # vdr: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vdr
        namespace: kubric
      spec:
        replicas: 2
  # kic: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kic
        namespace: kubric
      spec:
        replicas: 2
  # noc: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: noc
        namespace: kubric
      spec:
        replicas: 2
  # kai-core: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kai-core
        namespace: kubric
      spec:
        replicas: 2
  # web: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: kubric
      spec:
        replicas: 2
  # n8n: 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: n8n
        namespace: kubric
      spec:
        replicas: 2

images:
  - name: kubric/k-svc
    newTag: latest
  - name: kubric/vdr
    newTag: latest
  - name: kubric/kic
    newTag: latest
  - name: kubric/noc
    newTag: latest
  - name: kubric/kai
    newTag: latest
  - name: kubric/web
    newTag: latest
  - name: n8nio/n8n
    newTag: latest
