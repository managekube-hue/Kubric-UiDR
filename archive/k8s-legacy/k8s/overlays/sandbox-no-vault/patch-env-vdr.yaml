apiVersion: apps/v1
kind: Deployment
metadata:
  name: vdr
  namespace: kubric
spec:
  template:
    spec:
      containers:
        - name: vdr
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_ROLE
              value: kubric-vdr
            - name: VDR_LISTEN_ADDR
              value: ":8081"
            - name: KUBRIC_DATABASE_URL
              value: "postgresql://kubric:dev_password@postgresql:5432/kubric?sslmode=disable"
            - name: KUBRIC_NATS_URL
              value: "nats://nats:4222"
            - name: KUBRIC_JWT_SECRET
              value: "dev-jwt-secret-change-me"
