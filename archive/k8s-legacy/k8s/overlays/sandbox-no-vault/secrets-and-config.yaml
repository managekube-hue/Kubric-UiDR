---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: kubric
type: Opaque
stringData:
  username: kubric
  password: dev_password
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-tls
  namespace: kubric
type: Opaque
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    ZHVtbXktY2VydA==
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    ZHVtbXkta2V5
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: kubric
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 200
    shared_buffers = 256MB
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-scripts
  namespace: kubric
data:
  001_init.sql: |
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
---
apiVersion: v1
kind: Secret
metadata:
  name: kubric-db-credentials
  namespace: kubric
type: Opaque
stringData:
  url: postgresql://kubric:dev_password@postgresql:5432/kubric?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: kubric-auth-secrets
  namespace: kubric
type: Opaque
stringData:
  nextauth-secret: dev-nextauth-secret-change-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: kubric
data:
  nats-server.conf: |
    server_name: nats
    port: 4222
    http_port: 8222
    jetstream {
      store_dir: /data/jetstream
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-tls
  namespace: kubric
type: Opaque
stringData:
  ca.crt: dummy
  tls.crt: dummy
  tls.key: dummy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: kubric
data:
  config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>true</console>
      </logger>
      <listen_host>0.0.0.0</listen_host>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users
  namespace: kubric
data:
  users.xml: |
    <clickhouse>
      <users>
        <default>
          <password></password>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
        </default>
      </users>
      <profiles>
        <default/>
      </profiles>
      <quotas>
        <default/>
      </quotas>
    </clickhouse>
