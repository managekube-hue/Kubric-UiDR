# K-K8S-MESH-003 — Cilium CNI
# eBPF-powered K8s CNI: network policies, L7 visibility, kube-proxy replacement
# Shares eBPF stack with Tetragon for runtime security
#
# Install: helm install cilium cilium/cilium --namespace kube-system \
#   --set kubeProxyReplacement=strict \
#   --set hubble.enabled=true \
#   --set hubble.relay.enabled=true \
#   --set hubble.ui.enabled=true

# CiliumNetworkPolicy — fine-grained L7 pod-to-pod rules
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubric-service-policies
  namespace: kubric
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  ingress:
    # Allow NATS client connections from all kubric pods
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: kubric
      toPorts:
        - ports:
            - port: "4222"
              protocol: TCP
          rules:
            l7proto: ""
    # Allow HTTP API between services
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: kubric
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
              - method: "POST"
              - method: "PUT"
              - method: "DELETE"
  egress:
    # Allow DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    # Allow NATS cluster communication
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: nats
      toPorts:
        - ports:
            - port: "4222"
              protocol: TCP
            - port: "6222"
              protocol: TCP
    # Allow ClickHouse writes
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: clickhouse
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
            - port: "9000"
              protocol: TCP
    # Allow PostgreSQL connections
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: postgresql
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# CiliumClusterwideNetworkPolicy — default deny for non-kubric namespaces
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: kubric-default-deny-external
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: kubric
  ingressDeny:
    - fromEntities:
        - world
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/part-of
              operator: NotIn
              values: ["kubric"]
