# K-K8S-MESH-001 — Istio Service Mesh
# mTLS enforcement for all Kubric microservices
# Use Istio for multi-cluster enterprise; Linkerd for single-cluster simplicity
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: kubric-istio
  namespace: istio-system
spec:
  profile: default
  meshConfig:
    accessLogFile: /dev/stdout
    defaultConfig:
      tracing:
        zipkin:
          address: tempo.kubric.svc.cluster.local:9411
    enableAutoMtls: true
    outboundTrafficPolicy:
      mode: REGISTRY_ONLY
  components:
    ingressGateways:
      - name: istio-ingressgateway
        enabled: true
        k8s:
          service:
            ports:
              - name: https
                port: 443
                targetPort: 8443
              - name: http
                port: 80
                targetPort: 8080
    egressGateways:
      - name: istio-egressgateway
        enabled: true
  values:
    global:
      proxy:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
# Strict mTLS for kubric namespace
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: kubric-strict-mtls
  namespace: kubric
spec:
  mtls:
    mode: STRICT
---
# VirtualService for KAI -> K-SVC traffic shaping
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: k-svc
  namespace: kubric
spec:
  hosts:
    - k-svc
  http:
    - route:
        - destination:
            host: k-svc
            port:
              number: 8080
      retries:
        attempts: 3
        perTryTimeout: 5s
      timeout: 15s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: k-svc
  namespace: kubric
spec:
  host: k-svc
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        maxRequestsPerConnection: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
