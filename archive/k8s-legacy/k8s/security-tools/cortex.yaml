# ============================================================
# Cortex 3.1.8 — kubric-security namespace
# Exposes:
#   - 9001 (HTTP REST API + UI)
# Cortex runs analyzers/responders as Docker containers; in K8s
# you must expose the host Docker socket OR use the Kubernetes
# job-executor (see cortex.analyzers.runner in application.conf).
# ============================================================

---
# ClusterRole + Binding so Cortex can spawn Job pods (Kubernetes runner)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cortex-job-runner
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cortex-job-runner
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
subjects:
  - kind: ServiceAccount
    name: cortex
    namespace: kubric-security
roleRef:
  kind: ClusterRole
  name: cortex-job-runner
  apiGroup: rbac.authorization.k8s.io

---
# ConfigMap: cortex-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: cortex-config
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
data:
  application.conf: |
    # Cortex 3 application configuration
    # IMPORTANT: Change play.http.secret.key before any production deployment.

    play.http.secret.key = "kubric-cortex-secret-change-in-production"

    # ── Database (Elasticsearch) ──────────────────────────────────────────────
    # Point to your Elasticsearch / OpenSearch instance.
    # For a quick-start single-node deployment you can use a sidecar or a
    # separate Elasticsearch StatefulSet.
    search {
      uri        = "http://elasticsearch.kubric-security.svc.cluster.local:9200"
      keepalive  = 1m
      pagesize   = 10
      nbshards   = 5
      nbreplicas = 1
      scrolltime = 1m
      maxsize    = 500
    }

    # ── Analyzer / Responder runner ───────────────────────────────────────────
    # Use the Kubernetes job runner so Cortex doesn't need the Docker socket.
    analyzer {
      urls = [
        "https://dl.bintray.com/thehive-project/cortexneurons/analyzers.json"
      ]
      runner {
        kubernetes {
          namespace       = kubric-security
          jobServiceAccount = cortex
          imagePullPolicy = IfNotPresent
          # Resource limits for each analyzer Job pod
          resources {
            requests.cpu    = "100m"
            requests.memory = "128Mi"
            limits.cpu      = "1"
            limits.memory   = "1Gi"
          }
        }
      }
    }

    responder {
      urls = [
        "https://dl.bintray.com/thehive-project/cortexneurons/responders.json"
      ]
    }

    # ── HTTP / Play settings ──────────────────────────────────────────────────
    play.http.parser.maxDiskBuffer   = 128m
    play.http.parser.maxMemoryBuffer = 256k

    # Cache API keys for 5 minutes
    cache.job = 10 minutes

---
# PersistentVolumeClaim: cortex-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cortex-data
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Deployment: cortex
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/version: "3.1.8"
    app.kubernetes.io/component: analyzer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex
        app.kubernetes.io/version: "3.1.8"
        app.kubernetes.io/component: analyzer
      annotations:
        checksum/config: "change-via-kustomize-or-helm-hash"
    spec:
      serviceAccountName: cortex
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: init-dirs
          image: busybox:1.36.1
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /opt/cortex/data && \
              chown -R 1000:1000 /opt/cortex/data
          volumeMounts:
            - name: cortex-data
              mountPath: /opt/cortex/data
      containers:
        - name: cortex
          image: thehiveproject/cortex:3.1.8
          imagePullPolicy: IfNotPresent
          command:
            - /opt/cortex/entrypoint
            - --config-file
            - /etc/cortex/application.conf
            - -Dplay.server.http.port=9001
          ports:
            - name: http
              containerPort: 9001
              protocol: TCP
          env:
            - name: JVM_OPTS
              value: "-Xms512m -Xmx1g"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: cortex-config
              mountPath: /etc/cortex
              readOnly: true
            - name: cortex-data
              mountPath: /opt/cortex/data
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: cortex-config
          configMap:
            name: cortex-config
        - name: cortex-data
          persistentVolumeClaim:
            claimName: cortex-data

---
# Service: cortex
apiVersion: v1
kind: Service
metadata:
  name: cortex
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: cortex
    app.kubernetes.io/component: analyzer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cortex
  ports:
    - name: http
      port: 9001
      targetPort: http
      protocol: TCP
