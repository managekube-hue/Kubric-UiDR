# ============================================================
# Falco 0.40.0 (no-driver) — kubric-security namespace
# Runs as a DaemonSet on every node.
# Exposes:
#   - 8765 (Falco webserver / health endpoint)
# ============================================================

---
# ConfigMap: falco-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
data:
  falco.yaml: |
    # Falco main configuration
    # Reference: https://falco.org/docs/reference/daemon/config-options/

    # Rule file paths (mounted from ConfigMaps)
    rules_file:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/falco_rules.local.yaml
      - /etc/falco/custom_rules.yaml

    # ── Output format ─────────────────────────────────────────────────────────
    json_output: true
    json_include_output_property: true
    json_include_tags_property: true

    log_stderr: true
    log_syslog: false
    log_level: info

    # Priority: EMERGENCY DEBUG INFO NOTICE WARNING ERROR CRITICAL ALERT
    priority: debug

    # ── Outputs ───────────────────────────────────────────────────────────────
    stdout_output:
      enabled: true

    # File output for persistent log aggregation
    file_output:
      enabled: true
      keep_alive: false
      filename: /var/log/falco/events.log

    # Forward events to the Kubric NOC webhook (adjust host/port as needed)
    program_output:
      enabled: true
      keep_alive: false
      program: "curl -s -d @- http://noc.kubric-security.svc.cluster.local:8083/integrations/falco/webhook"

    # HTTP output — alternative to program_output for in-cluster consumers
    http_output:
      enabled: false
      url: "http://noc.kubric-security.svc.cluster.local:8083/integrations/falco/webhook"
      user_agent: "falcosecurity/falco"

    # ── Webserver ─────────────────────────────────────────────────────────────
    webserver:
      enabled: true
      listen_port: 8765
      k8s_healthz_endpoint: /healthz
      ssl_enabled: false

    # ── Syscall source (eBPF / modern eBPF / kmod) ────────────────────────────
    # falco-no-driver uses modern_ebpf by default (kernel >= 5.8).
    # Uncomment the block below to force legacy eBPF probe if needed.
    # engine:
    #   kind: ebpf
    #   ebpf:
    #     probe: ${HOME}/.falco/falco-bpf.o
    #     buf_size_preset: 4
    #     drop_failed_exit: false

    # ── Syscall buffer tuning ─────────────────────────────────────────────────
    syscall_event_drops:
      threshold: 0.1
      actions:
        - log
        - alert
      rate: 0.03333
      max_burst: 10

    # ── Metadata enrichment ───────────────────────────────────────────────────
    metadata_download:
      max_mb: 100
      chunk_wait_us: 1000
      watch_freq_sec: 1

---
# ConfigMap: falco-custom-rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
data:
  custom_rules.yaml: |
    # ============================================================
    # Kubric Platform — Custom Falco Rules
    # ============================================================

    # ── Rule 1: Shell spawned inside a container ─────────────────────────────
    - rule: Shell Spawned in Container
      desc: >
        Detects any interactive or non-interactive shell process spawned
        inside a running container. Shells in containers are almost always
        an indicator of active intrusion, debug misuse, or a breakout attempt.
      condition: >
        spawned_process and
        container and
        shell_procs and
        not container.image.repository in (allowed_shell_images) and
        not proc.pname in (shell_procs)
      output: >
        Shell spawned in container
        (user=%user.name user_loginuid=%user.loginuid
         container_id=%container.id container_name=%container.name
         image=%container.image.repository:%container.image.tag
         shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline
         terminal=%proc.tty)
      priority: WARNING
      tags: [container, shell, kubric, mitre_execution]

    # ── Macro + List supporting Rule 1 ───────────────────────────────────────
    - list: allowed_shell_images
      items: []

    - list: shell_procs
      items: [bash, sh, zsh, ksh, fish, dash, tcsh, csh, ash]

    - macro: shell_procs
      condition: proc.name in (shell_procs)

    # ── Rule 2: Sensitive host path mounted in container ─────────────────────
    - rule: Sensitive Host Path Mounted Read-Write
      desc: >
        Alerts when a container has mounted a sensitive host filesystem path
        (such as /etc, /proc, /sys, or the Docker/containerd socket) as
        read-write. This is a common privilege escalation and persistence vector.
      condition: >
        container and
        (fd.name startswith /etc/ or
         fd.name startswith /proc/ or
         fd.name startswith /sys/ or
         fd.name = /var/run/docker.sock or
         fd.name = /run/containerd/containerd.sock) and
        open_write
      output: >
        Write to sensitive host path from container
        (user=%user.name user_loginuid=%user.loginuid
         container_id=%container.id container_name=%container.name
         image=%container.image.repository:%container.image.tag
         file=%fd.name cmdline=%proc.cmdline)
      priority: ERROR
      tags: [container, filesystem, kubric, mitre_persistence, mitre_privilege_escalation]

    # ── Rule 3: Privilege escalation via setuid/setgid binary ────────────────
    - rule: Setuid / Setgid Bit Execution in Container
      desc: >
        Detects execution of a file that has the setuid or setgid bit set
        inside a container. Attackers use setuid binaries such as sudo, su,
        or custom-planted binaries to escalate privileges within a compromised
        container.
      condition: >
        spawned_process and
        container and
        (proc.is_suid_exe = true or proc.is_sgid_exe = true) and
        not proc.name in (safe_setuid_binaries)
      output: >
        Setuid/setgid binary executed in container
        (user=%user.name user_loginuid=%user.loginuid
         container_id=%container.id container_name=%container.name
         image=%container.image.repository:%container.image.tag
         binary=%proc.exepath cmdline=%proc.cmdline
         is_suid=%proc.is_suid_exe is_sgid=%proc.is_sgid_exe)
      priority: CRITICAL
      tags: [container, privilege_escalation, kubric, mitre_privilege_escalation]

    - list: safe_setuid_binaries
      items: [sudo, ping, passwd, newgrp]

---
# DaemonSet: falco
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/version: "0.40.0"
    app.kubernetes.io/component: runtime-security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: falco
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falco
        app.kubernetes.io/version: "0.40.0"
        app.kubernetes.io/component: runtime-security
      annotations:
        checksum/config: "change-via-kustomize-or-helm-hash"
        checksum/rules: "change-via-kustomize-or-helm-hash"
    spec:
      # Run on every node including masters / control-plane
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: PreferNoSchedule

      # Required for syscall introspection
      hostPID: true
      hostNetwork: true

      # Falco needs access to host namespaces and kernel interfaces
      dnsPolicy: ClusterFirstWithHostNet

      terminationGracePeriodSeconds: 30
      containers:
        - name: falco
          image: falcosecurity/falco-no-driver:0.40.0
          imagePullPolicy: IfNotPresent
          args:
            - /usr/bin/falco
            - --config
            - /etc/falco/falco.yaml
            - -pk    # print Kubernetes metadata in outputs
          ports:
            - name: webserver
              containerPort: 8765
              hostPort: 8765
              protocol: TCP
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: FALCO_BPF_PROBE
              value: ""    # empty = use modern_ebpf (kernel >= 5.8)
            - name: HOST_ROOT
              value: /host
          volumeMounts:
            # Host filesystem mounts for syscall and kernel module access
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-dev
              mountPath: /host/dev
              readOnly: true
            # Falco configuration
            - name: falco-config
              mountPath: /etc/falco/falco.yaml
              subPath: falco.yaml
              readOnly: true
            # Custom rules
            - name: falco-custom-rules
              mountPath: /etc/falco/custom_rules.yaml
              subPath: custom_rules.yaml
              readOnly: true
            # Persistent log output
            - name: falco-logs
              mountPath: /var/log/falco
          livenessProbe:
            httpGet:
              path: /healthz
              port: webserver
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: webserver
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        # Host paths
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-dev
          hostPath:
            path: /dev
        # ConfigMaps
        - name: falco-config
          configMap:
            name: falco-config
        - name: falco-custom-rules
          configMap:
            name: falco-custom-rules
        # emptyDir log volume (use a hostPath or PVC for persistent logs)
        - name: falco-logs
          emptyDir: {}

---
# Service: falco (exposes the webserver for health checks and metrics scraping)
apiVersion: v1
kind: Service
metadata:
  name: falco
  namespace: kubric-security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: falco
  ports:
    - name: webserver
      port: 8765
      targetPort: webserver
      protocol: TCP
