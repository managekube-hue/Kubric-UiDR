---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "kubric-kic"
---
apiVersion: v1
kind: Service
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
spec:
  selector:
    app: kic
  ports:
    - name: http
      port: 8082
      targetPort: 8082
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kic
  namespace: kubric
  labels:
    app.kubernetes.io/name: kic
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kic
  template:
    metadata:
      labels:
        app: kic
        app.kubernetes.io/name: kic
        app.kubernetes.io/part-of: kubric
        kubric/tenant-aware: "true"
    spec:
      serviceAccountName: kic
      containers:
        - name: kic
          image: kubric/kic:latest
          ports:
            - name: http
              containerPort: 8082
            - name: metrics
              containerPort: 9090
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_ROLE
              value: kubric-kic
            - name: KIC_LISTEN_ADDR
              value: ":8082"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 30
            initialDelaySeconds: 15
