---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vdr
  namespace: kubric
  labels:
    app.kubernetes.io/name: vdr
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "kubric-vdr"
---
apiVersion: v1
kind: Service
metadata:
  name: vdr
  namespace: kubric
  labels:
    app.kubernetes.io/name: vdr
    app.kubernetes.io/part-of: kubric
spec:
  selector:
    app: vdr
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vdr
  namespace: kubric
  labels:
    app.kubernetes.io/name: vdr
    app.kubernetes.io/part-of: kubric
    kubric/tenant-aware: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vdr
  template:
    metadata:
      labels:
        app: vdr
        app.kubernetes.io/name: vdr
        app.kubernetes.io/part-of: kubric
        kubric/tenant-aware: "true"
    spec:
      serviceAccountName: vdr
      containers:
        - name: vdr
          image: kubric/vdr:latest
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 9090
          env:
            - name: VAULT_ADDR
              value: http://vault:8200
            - name: VAULT_ROLE
              value: kubric-vdr
            - name: VDR_LISTEN_ADDR
              value: ":8081"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 30
            initialDelaySeconds: 15
