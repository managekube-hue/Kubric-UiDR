---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: kubric
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: kubric
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: kubric
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: kubric
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kubric
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: kubric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: kubric
    spec:
      serviceAccountName: web
      containers:
        - name: web
          image: kubric/web:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: "http://k-svc:8080"
            - name: NEXT_PUBLIC_NATS_WS_URL
              value: "ws://nats:9222"
            - name: NEXTAUTH_URL
              value: "https://app.kubric.security"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubric-auth-secrets
                  key: nextauth-secret
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/session
              port: 3000
            periodSeconds: 30
            initialDelaySeconds: 10
