# K-K8S-002 — NATS JetStream StatefulSet
# Cluster-wide message bus — 3-node JetStream cluster with mTLS
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: kubric
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: message-bus
spec:
  serviceName: nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: kubric
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "-js"
            - "--config=/etc/nats/nats-server.conf"
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: data
              mountPath: /data/jetstream
            - name: config
              mountPath: /etc/nats
            - name: tls
              mountPath: /etc/nats/tls
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz?js-enabled-only=true
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: tls
          secret:
            secretName: nats-tls
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: kubric
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
    - name: cluster
      port: 6222
    - name: monitor
      port: 8222
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: kubric
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
    - name: monitor
      port: 8222
