# K-K8S-001 — ClickHouse StatefulSet
# Hot telemetry OCSF event store — 2 shards, 2 replicas per shard
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: kubric
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: kubric
    app.kubernetes.io/component: data-lakehouse
spec:
  serviceName: clickhouse-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: kubric
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsNonRoot: true
      initContainers:
        - name: copy-users-config
          image: clickhouse/clickhouse-server:24.1
          command: ["sh", "-c", "cp /etc/clickhouse-server/users.d-cm/* /etc/clickhouse-server/users.d/ 2>/dev/null || true"]
          volumeMounts:
            - name: users-cm
              mountPath: /etc/clickhouse-server/users.d-cm
            - name: users-writable
              mountPath: /etc/clickhouse-server/users.d
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.1
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
            - name: interserver
              containerPort: 9009
          env:
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d
            - name: users-writable
              mountPath: /etc/clickhouse-server/users.d
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 32Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
        - name: users-cm
          configMap:
            name: clickhouse-users
        - name: users-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 500Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  namespace: kubric
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
    - name: interserver
      port: 9009
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: kubric
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
