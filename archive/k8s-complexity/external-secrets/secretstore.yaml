# infra/external-secrets/secretstore.yaml
# ClusterSecretStore backed by HashiCorp Vault.
# Requires External Secrets Operator installed:
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.kubric.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: kubric-external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
