openapi: 3.0.3
info:
  title: Kubric KAI Triage API
  description: >
    AI-powered alert triage and investigation endpoints.
    The KAI Go gateway (internal/kai) authenticates requests via JWT,
    enforces tenant context via X-Kubric-Tenant-Id, and reverse-proxies
    to the KAI Python FastAPI service.
  version: 1.0.0
  contact:
    name: Kubric Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8100
    description: Local development (KAI gateway default listen address)

security:
  - bearerAuth: []

tags:
  - name: triage
    description: AI-powered alert triage and analysis
  - name: operations
    description: Async operation status tracking

paths:
  /kai/analyze:
    post:
      operationId: triageAlert
      tags: [triage]
      summary: Triage an alert using KAI
      description: >
        Submits an alert or incident for AI-powered triage analysis.
        KAI evaluates severity, extracts IOCs, maps to MITRE ATT&CK,
        and recommends response actions. Requires X-Kubric-Tenant-Id header.
        Returns immediately with an operation ID for async status polling
        when the analysis is long-running.
      parameters:
        - $ref: "#/components/parameters/XKubricTenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: >
            Synchronous analysis result (returned when analysis completes
            within the request timeout).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "202":
          description: >
            Analysis accepted for async processing. Poll
            /kai/operations/{id} for results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationAccepted"
        "400":
          description: Missing X-Kubric-Tenant-Id header.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "502":
          description: KAI Python backend unreachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /kai/operations/{id}:
    get:
      operationId: getOperation
      tags: [operations]
      summary: Check async operation status
      description: >
        Polls the status of a long-running KAI operation (analysis,
        investigation, or remediation). Returns the current state and,
        when complete, the full result payload.
      parameters:
        - $ref: "#/components/parameters/XKubricTenantId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Operation ID returned by the initial request.
      responses:
        "200":
          description: Operation status and optional result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XKubricTenantId:
      name: X-Kubric-Tenant-Id
      in: header
      required: true
      schema:
        type: string
      description: >
        Tenant identifier. Required for all /kai/* routes.
        Set by the kubricmw.TenantContext middleware.

  schemas:
    AnalyzeRequest:
      type: object
      required:
        - alert
      properties:
        alert:
          type: object
          description: >
            The alert payload to triage. Can be a Kubric Incident,
            a raw Wazuh alert, Suricata Eve event, or Falco alert.
          properties:
            id:
              type: string
              description: Alert or incident ID.
            title:
              type: string
              description: Alert title/summary.
            description:
              type: string
              description: Full alert description or raw output.
            severity:
              type: integer
              minimum: 1
              maximum: 5
              description: Severity level (1=info, 5=critical).
            source:
              type: string
              enum: [coresec, netguard, wazuh, falco, suricata, manual]
              description: Originating detection source.
            indicators:
              type: array
              items:
                type: string
              description: IOCs associated with the alert (IPs, hashes, domains).
            raw_data:
              type: object
              additionalProperties: true
              description: Raw event data from the source system.
        context:
          type: object
          description: Optional additional context for the analysis.
          properties:
            include_mitre:
              type: boolean
              default: true
              description: Whether to include MITRE ATT&CK mapping.
            include_recommendations:
              type: boolean
              default: true
              description: Whether to include response recommendations.

    AnalyzeResponse:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed]
        result:
          $ref: "#/components/schemas/TriageResult"

    TriageResult:
      type: object
      properties:
        verdict:
          type: string
          enum: [true_positive, false_positive, suspicious, benign, inconclusive]
          description: AI assessment of the alert.
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score (0.0 to 1.0).
        adjusted_severity:
          type: integer
          minimum: 1
          maximum: 5
          description: AI-adjusted severity after triage.
        summary:
          type: string
          description: Human-readable analysis summary.
        mitre_mapping:
          type: object
          properties:
            tactic:
              type: string
              example: initial-access
            technique:
              type: string
              example: T1190
            description:
              type: string
        indicators_extracted:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              type:
                type: string
                enum: [ip, domain, hash, url, email, other]
              malicious:
                type: boolean
        recommendations:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
                description: Recommended response action.
              priority:
                type: string
                enum: [immediate, high, medium, low]
              description:
                type: string

    OperationAccepted:
      type: object
      required:
        - operation_id
        - status
      properties:
        operation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted, pending]

    OperationStatus:
      type: object
      required:
        - operation_id
        - status
      properties:
        operation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Progress indicator (0.0 to 1.0).
        result:
          $ref: "#/components/schemas/TriageResult"
        error:
          type: string
          description: Error message when status is "failed".
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
