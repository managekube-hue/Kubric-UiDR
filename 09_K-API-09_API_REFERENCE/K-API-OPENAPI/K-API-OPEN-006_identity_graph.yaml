openapi: 3.0.3
info:
  title: Kubric NOC Identity Graph (BloodHound CE) API
  description: >
    Integration endpoints for BloodHound Community Edition identity and
    attack-path analysis. Served by the NOC service (internal/noc) via
    the integrationHandler. All routes are under /integrations/bloodhound.
    Routes return 503 when BloodHound is not configured.
    Requires kubric:admin or kubric:analyst role.
  version: 1.0.0
  contact:
    name: Kubric Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8083
    description: Local development (NOC default listen address)

security:
  - bearerAuth: []

tags:
  - name: bloodhound
    description: BloodHound CE identity graph and attack-path analysis

paths:
  /integrations/bloodhound/domains:
    get:
      operationId: bhListDomains
      tags: [bloodhound]
      summary: List Active Directory domains
      description: >
        Returns all AD domains known to BloodHound CE. Used to enumerate
        environments before querying attack paths or running Cypher analysis.
      responses:
        "200":
          description: Array of domain objects from BloodHound.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"
        "502":
          description: BloodHound API returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

  /integrations/bloodhound/domains/{domainID}/attack-paths:
    get:
      operationId: bhListAttackPaths
      tags: [bloodhound]
      summary: List attack paths for a domain
      description: >
        Returns computed attack paths from BloodHound for the specified AD
        domain. Attack paths show privilege escalation chains from low-privilege
        users to high-value targets (Domain Admins, etc.).
      parameters:
        - name: domainID
          in: path
          required: true
          schema:
            type: string
          description: BloodHound domain identifier.
      responses:
        "200":
          description: Array of attack path objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttackPath"
        "502":
          description: BloodHound API returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

  /integrations/bloodhound/cypher:
    post:
      operationId: bhRunCypher
      tags: [bloodhound]
      summary: Execute a Cypher query against BloodHound
      description: >
        Runs an arbitrary Cypher query against the BloodHound Neo4j graph
        database. Useful for custom identity-risk queries beyond pre-computed
        attack paths.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CypherRequest"
      responses:
        "200":
          description: Cypher query result set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CypherResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "502":
          description: BloodHound API returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Domain:
      type: object
      properties:
        id:
          type: string
          description: BloodHound internal domain ID.
        name:
          type: string
          example: ACME.LOCAL
          description: Active Directory domain FQDN.
        collected:
          type: boolean
          description: Whether SharpHound data collection has been performed.
        domain_sid:
          type: string
          example: S-1-5-21-3623811015-3361044348-30300820
        type:
          type: string
          example: Domain

    AttackPath:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          description: Human-readable attack path name.
          example: Shortest path to Domain Admins
        source:
          type: object
          properties:
            name:
              type: string
              example: JSMITH@ACME.LOCAL
            type:
              type: string
              example: User
        target:
          type: object
          properties:
            name:
              type: string
              example: DOMAIN ADMINS@ACME.LOCAL
            type:
              type: string
              example: Group
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
                example: MemberOf
          description: Ordered list of relationship edges forming the path.
        depth:
          type: integer
          description: Number of hops in the attack path.
        risk_score:
          type: number
          format: float
          description: Computed risk score for this path.

    CypherRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          example: "MATCH (n:User) RETURN n LIMIT 10"
          description: Cypher query to execute against the BloodHound graph.
        parameters:
          type: object
          additionalProperties: true
          description: Optional Cypher query parameters.

    CypherResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Result rows from the Cypher query.
        columns:
          type: array
          items:
            type: string
          description: Column names in the result set.

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid JSON in request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error (e.g., empty query).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    IntegrationNotConfigured:
      description: BloodHound integration is not configured on this NOC instance.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: integration not configured
