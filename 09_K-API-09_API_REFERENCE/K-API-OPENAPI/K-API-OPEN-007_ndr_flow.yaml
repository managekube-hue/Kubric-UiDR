openapi: 3.0.3
info:
  title: Kubric NOC NDR Flow Data API
  description: >
    Network Detection and Response (NDR) data endpoints for Suricata alerts
    and Zeek connection/DNS logs. Suricata Eve JSON events are ingested via
    the webhook receiver and stored in the correlation engine event buffer.
    Zeek logs are parsed from TSV log files. These endpoints are served by
    the NOC service via the correlation engine timeline and webhook handlers.
  version: 1.0.0
  contact:
    name: Kubric Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8083
    description: Local development (NOC default listen address)

security:
  - bearerAuth: []

tags:
  - name: suricata
    description: Suricata IDS alert data
  - name: zeek
    description: Zeek network connection and DNS log data

paths:
  /integrations/suricata/alerts:
    get:
      operationId: listSuricataAlerts
      tags: [suricata]
      summary: List Suricata IDS alerts
      description: >
        Returns Suricata Eve JSON alert events ingested through the
        /webhooks/suricata endpoint or the NATS kubric.*.suricata.alert.v1
        subject. Internally queries the correlation engine event buffer
        via the /detection/timeline endpoint with source=suricata filter.
        Requires kubric:analyst or kubric:readonly role.
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          description: Tenant identifier.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of time range (RFC3339). Defaults to 5 minutes ago.
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of time range (RFC3339). Defaults to now.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 200
      responses:
        "200":
          description: Array of Suricata Eve alert events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SuricataAlert"
                  count:
                    type: integer
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

  /integrations/zeek/connections:
    get:
      operationId: listZeekConnections
      tags: [zeek]
      summary: List Zeek connection logs
      description: >
        Returns parsed Zeek conn.log entries. Connection records include
        source/destination IPs, ports, protocol, duration, byte counts,
        connection state, and Community ID flow hashes.
        Requires kubric:analyst or kubric:readonly role.
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          description: Tenant identifier.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of time range (RFC3339). Defaults to 5 minutes ago.
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of time range (RFC3339). Defaults to now.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 200
      responses:
        "200":
          description: Array of Zeek connection log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZeekConnection"
                  count:
                    type: integer
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

  /integrations/zeek/dns:
    get:
      operationId: listZeekDNS
      tags: [zeek]
      summary: List Zeek DNS logs
      description: >
        Returns parsed Zeek dns.log entries. DNS records include query name,
        type, response code, answers, and TTLs. Useful for identifying
        DGA domains, DNS tunneling, and C2 beaconing.
        Requires kubric:analyst or kubric:readonly role.
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          description: Tenant identifier.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of time range (RFC3339). Defaults to 5 minutes ago.
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of time range (RFC3339). Defaults to now.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 200
      responses:
        "200":
          description: Array of Zeek DNS log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZeekDNS"
                  count:
                    type: integer
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/IntegrationNotConfigured"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuricataAlert:
      type: object
      description: Suricata Eve JSON alert event.
      properties:
        timestamp:
          type: string
          description: Eve event timestamp.
        flow_id:
          type: integer
          format: int64
        event_type:
          type: string
          enum: [alert]
        src_ip:
          type: string
          format: ipv4
          example: 192.168.1.100
        src_port:
          type: integer
        dest_ip:
          type: string
          format: ipv4
          example: 10.0.0.1
        dest_port:
          type: integer
        proto:
          type: string
          enum: [TCP, UDP, ICMP]
        community_id:
          type: string
          description: Community ID flow hash.
        alert:
          type: object
          properties:
            action:
              type: string
              enum: [allowed, blocked]
            gid:
              type: integer
              description: Generator ID.
            signature_id:
              type: integer
              description: Rule SID.
            rev:
              type: integer
            signature:
              type: string
              example: "ET MALWARE Cobalt Strike Beacon"
            category:
              type: string
              example: "Malware Command and Control Activity Detected"
            severity:
              type: integer
              minimum: 1
              maximum: 3
              description: "1=high, 2=medium, 3=low"
            metadata:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
        app_proto:
          type: string
          example: http

    ZeekConnection:
      type: object
      description: Zeek conn.log entry.
      properties:
        ts:
          type: string
          format: date-time
          description: Connection start timestamp.
        uid:
          type: string
          description: Unique connection identifier.
        id.orig_h:
          type: string
          format: ipv4
          example: 192.168.1.100
        id.orig_p:
          type: integer
          example: 49152
        id.resp_h:
          type: string
          format: ipv4
          example: 93.184.216.34
        id.resp_p:
          type: integer
          example: 443
        proto:
          type: string
          enum: [tcp, udp, icmp]
        service:
          type: string
          example: ssl
        duration:
          type: number
          format: float
          description: Connection duration in seconds.
        orig_bytes:
          type: integer
          format: int64
        resp_bytes:
          type: integer
          format: int64
        conn_state:
          type: string
          enum: [S0, S1, SF, REJ, S2, S3, RSTO, RSTR, RSTOS0, RSTRH, SH, SHR, OTH]
          description: Zeek connection state.
        local_orig:
          type: boolean
        local_resp:
          type: boolean
        missed_bytes:
          type: integer
          format: int64
        history:
          type: string
          description: Connection state history string.
        orig_pkts:
          type: integer
          format: int64
        orig_ip_bytes:
          type: integer
          format: int64
        resp_pkts:
          type: integer
          format: int64
        resp_ip_bytes:
          type: integer
          format: int64
        community_id:
          type: string

    ZeekDNS:
      type: object
      description: Zeek dns.log entry.
      properties:
        ts:
          type: string
          format: date-time
        uid:
          type: string
        id.orig_h:
          type: string
          format: ipv4
        id.orig_p:
          type: integer
        id.resp_h:
          type: string
          format: ipv4
        id.resp_p:
          type: integer
        proto:
          type: string
          enum: [tcp, udp]
        trans_id:
          type: integer
        rtt:
          type: number
          format: float
          description: Round-trip time in seconds.
        query:
          type: string
          example: evil-c2.example.com
          description: DNS query name.
        qclass:
          type: integer
        qclass_name:
          type: string
          example: C_INTERNET
        qtype:
          type: integer
        qtype_name:
          type: string
          example: A
        rcode:
          type: integer
        rcode_name:
          type: string
          example: NOERROR
        AA:
          type: boolean
          description: Authoritative answer flag.
        TC:
          type: boolean
          description: Truncation flag.
        RD:
          type: boolean
          description: Recursion desired flag.
        RA:
          type: boolean
          description: Recursion available flag.
        answers:
          type: array
          items:
            type: string
          example: ["93.184.216.34"]
        TTLs:
          type: array
          items:
            type: number
            format: float
          example: [3600.0]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    UnprocessableEntity:
      description: Validation error (e.g. missing tenant_id).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    IntegrationNotConfigured:
      description: NDR integration (Suricata/Zeek) is not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: integration not configured
