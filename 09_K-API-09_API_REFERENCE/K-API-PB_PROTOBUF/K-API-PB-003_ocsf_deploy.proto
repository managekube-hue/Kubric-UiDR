// Agent Deployment Lifecycle Service for Kubric UiDR
// Manages provisioning, health reporting, updates, and inventory of
// XRO agents (CoreSec, NetGuard, PerfTrace, Watchdog, Provisioning).

syntax = "proto3";

package kubric.deploy.v1;

option go_package = "github.com/managekube-hue/Kubric-UiDR/proto/deploy/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

// ──────────────────────────────────────────────────────────────────────
// Enums
// ──────────────────────────────────────────────────────────────────────

// Kubric XRO agent types.
enum AgentType {
  AGENT_TYPE_UNSPECIFIED  = 0;
  AGENT_TYPE_CORESEC      = 1;  // K-XRO-CS – endpoint detection & response
  AGENT_TYPE_NETGUARD     = 2;  // K-XRO-NG – network sensor
  AGENT_TYPE_PERFTRACE    = 3;  // K-XRO-PT – performance telemetry
  AGENT_TYPE_WATCHDOG     = 4;  // K-XRO-WD – agent supervisor / heartbeat
  AGENT_TYPE_PROVISIONING = 5;  // K-XRO-PV – bootstrap & enrollment
}

// Deployment lifecycle states.
enum DeployStatus {
  DEPLOY_STATUS_UNSPECIFIED = 0;
  DEPLOY_STATUS_PENDING     = 1;  // Request accepted, not yet started
  DEPLOY_STATUS_DEPLOYING   = 2;  // Binary push / config download in progress
  DEPLOY_STATUS_RUNNING     = 3;  // Agent healthy and reporting
  DEPLOY_STATUS_FAILED      = 4;  // Deployment or startup failure
  DEPLOY_STATUS_UPDATING    = 5;  // In-place update in progress
  DEPLOY_STATUS_STOPPED     = 6;  // Gracefully stopped
  DEPLOY_STATUS_DEGRADED    = 7;  // Running but with reduced capabilities
}

// Platform the agent is running on.
enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_LINUX       = 1;
  PLATFORM_WINDOWS     = 2;
  PLATFORM_MACOS       = 3;
  PLATFORM_CONTAINER   = 4;
  PLATFORM_KUBERNETES  = 5;
}

// ──────────────────────────────────────────────────────────────────────
// Messages
// ──────────────────────────────────────────────────────────────────────

// Labels / tags attached to an agent registration for fleet grouping.
message AgentLabels {
  string customer_id   = 1;
  string tenant_id     = 2;
  string environment   = 3;  // production, staging, development
  string site          = 4;  // physical or logical site name
  map<string, string> tags = 5;
}

// Describes the target host where the agent will be deployed.
message TargetHost {
  string hostname    = 1;
  string ip          = 2;
  string mac         = 3;
  Platform platform  = 4;
  string os_version  = 5;
  string arch        = 6;  // amd64, arm64
  string kernel      = 7;
}

// Agent binary / package version descriptor.
message AgentVersion {
  string version       = 1;  // Semantic version, e.g. "2.4.1"
  string sha256        = 2;  // SHA-256 of the binary package
  string download_url  = 3;  // Presigned URL or artifact registry ref
  string changelog_url = 4;
}

// ── Request / Response messages ─────────────────────────────────────

// Request to deploy one or more agent types to a target host.
message AgentDeployRequest {
  string           request_id    = 1;  // Idempotency key (UUID v7)
  TargetHost       target        = 2;
  repeated AgentType agent_types = 3;  // Agents to deploy on the host
  AgentVersion     version       = 4;  // Desired agent version
  AgentLabels      labels        = 5;
  google.protobuf.Struct config_overrides = 6;  // Per-host config patches
  bool             force_reinstall = 7;  // Wipe and redeploy if already present
  string           vault_role    = 8;  // Vault role for credential bootstrap
  google.protobuf.Timestamp scheduled_time = 9;  // Zero = immediate
}

// Result of a deploy request.
message AgentDeployResponse {
  string             request_id  = 1;
  string             agent_id    = 2;  // Assigned agent UUID
  DeployStatus       status      = 3;
  string             message     = 4;  // Human-readable status text
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Periodic health report sent by a running agent.
message AgentHealthReport {
  string     agent_id     = 1;
  AgentType  agent_type   = 2;
  DeployStatus status     = 3;
  string     version      = 4;
  TargetHost host         = 5;
  AgentLabels labels      = 6;
  double     cpu_percent  = 7;
  int64      memory_bytes = 8;
  int64      disk_bytes   = 9;
  int64      events_processed = 10;  // Since last report
  int64      events_dropped   = 11;
  int64      uptime_seconds   = 12;
  google.protobuf.Timestamp report_time = 13;
  repeated string active_modules = 14;  // e.g. ["sigma","yara","osquery"]
  string     last_error   = 15;
  google.protobuf.Struct extra_metrics = 16;
}

// Request to update an agent in-place to a new version.
message AgentUpdateRequest {
  string       agent_id      = 1;
  AgentVersion target_version = 2;
  bool         force         = 3;   // Skip pre-flight checks
  bool         canary        = 4;   // Use canary rollout strategy
  int32        canary_percent = 5;  // Percentage of fleet for canary
  google.protobuf.Timestamp scheduled_time = 6;
  google.protobuf.Duration  timeout = 7;  // Max time for update
}

// Status report for an ongoing or completed update.
message AgentUpdateStatus {
  string             agent_id       = 1;
  string             request_id     = 2;
  DeployStatus       status         = 3;
  string             previous_version = 4;
  string             target_version = 5;
  string             message        = 6;
  google.protobuf.Timestamp started_at  = 7;
  google.protobuf.Timestamp completed_at = 8;
  bool               rollback_triggered = 9;
  string             rollback_reason    = 10;
}

// Filter criteria for listing agents.
message AgentListRequest {
  string     customer_id = 1;
  AgentType  agent_type  = 2;  // 0 = all types
  DeployStatus status    = 3;  // 0 = all statuses
  string     environment = 4;
  string     site        = 5;
  int32      page_size   = 6;
  string     page_token  = 7;
}

// Paginated list of agent registrations.
message AgentListResponse {
  repeated AgentRegistration agents = 1;
  string next_page_token = 2;
  int32  total_count      = 3;
}

// Stored agent registration record.
message AgentRegistration {
  string       agent_id    = 1;
  AgentType    agent_type  = 2;
  DeployStatus status      = 3;
  string       version     = 4;
  TargetHost   host        = 5;
  AgentLabels  labels      = 6;
  google.protobuf.Timestamp registered_at  = 7;
  google.protobuf.Timestamp last_heartbeat = 8;
}

// Request to decommission / uninstall an agent.
message AgentDecommissionRequest {
  string agent_id = 1;
  bool   purge_data = 2;  // Remove local telemetry cache on host
  string reason     = 3;
}

message AgentDecommissionResponse {
  string       agent_id = 1;
  DeployStatus status   = 2;
  string       message  = 3;
}

// ──────────────────────────────────────────────────────────────────────
// Service
// ──────────────────────────────────────────────────────────────────────

// AgentDeployService manages the full lifecycle of Kubric XRO agents.
service AgentDeployService {
  // Deploy one or more agent types to a target host.
  rpc Deploy(AgentDeployRequest) returns (AgentDeployResponse);

  // Receive a health report from a running agent (called by agents).
  rpc ReportHealth(AgentHealthReport) returns (google.protobuf.Empty);

  // Stream real-time health from the agent to the control plane.
  rpc StreamHealth(stream AgentHealthReport) returns (google.protobuf.Empty);

  // Get the latest health report for an agent.
  rpc GetHealth(AgentHealthRequest) returns (AgentHealthReport);

  // Trigger an in-place update of an agent.
  rpc Update(AgentUpdateRequest) returns (AgentUpdateStatus);

  // List registered agents with optional filters.
  rpc List(AgentListRequest) returns (AgentListResponse);

  // Decommission an agent and optionally purge its data.
  rpc Decommission(AgentDecommissionRequest) returns (AgentDecommissionResponse);
}

// Lightweight request to fetch health for a single agent.
message AgentHealthRequest {
  string agent_id = 1;
}
